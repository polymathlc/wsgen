/* =========================================================================
   MUTATIONS
   ========================================================================= */
function addQuestion() {
  state.questions.push(makeQuestion());
  renderEditor(); renderPreview();
}
function randomizeQuestionOrder() {
  // Shuffle only real questions; instruction blocks keep their slot so
  // section headers don't get scattered through the worksheet.
  const movableIdx = [];
  state.questions.forEach((q, i) => { if (!isInstruction(q)) movableIdx.push(i); });
  if (movableIdx.length < 2) {
    alert('Need at least two questions to randomize.');
    return;
  }
  if (!confirm('Shuffle the order of questions in this worksheet?')) return;
  logActivity('before randomize order');
  const picked = movableIdx.map(i => state.questions[i]);
  for (let i = picked.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [picked[i], picked[j]] = [picked[j], picked[i]];
  }
  movableIdx.forEach((origIdx, k) => { state.questions[origIdx] = picked[k]; });
  renderEditor(); renderPreview();
}

/* =========================================================================
   SORT QUESTIONS BY TOPIC

   Singapore Primary Science Syllabus 2023 (Primary 3 to 6) — the topics in
   their teaching sequence, from the first P3 topic (Diversity of living and
   non-living things) through to the last P6 topic (Interactions within the
   environment). Each entry carries lower-case keywords that map a question's
   free-text topic / concept onto its syllabus topic, so a worksheet can be
   grouped to follow this progression. Questions that don't match any topic
   (e.g. maths, exam-skill tags) keep their relative order and sit at the end.
   ========================================================================= */
const SYLLABUS_TOPICS = [
  { level: 'P3', theme: 'Diversity',    name: 'Diversity of living and non-living things', kw: ['living and non-living', 'living and non living', 'non-living', 'non living', 'living things', 'diversity of living', 'general characteristics', 'classification', 'classify'] },
  { level: 'P3', theme: 'Diversity',    name: 'Diversity of materials',                    kw: ['material'] },
  { level: 'P3', theme: 'Cycles',       name: 'Cycles in plants and animals (Life cycles)',kw: ['life cycle', 'lifecycle'] },
  { level: 'P3', theme: 'Interactions', name: 'Interaction of forces (Magnets)',           kw: ['magnet'] },
  { level: 'P4', theme: 'Systems',      name: 'Plant system (Plant parts and functions)',  kw: ['plant parts', 'plant part', 'parts and function', 'plant system', 'plants'] },
  { level: 'P4', theme: 'Systems',      name: 'Human system (Digestive system)',           kw: ['digestive', 'digestion'] },
  { level: 'P4', theme: 'Cycles',       name: 'Cycles in matter and water (Matter)',       kw: ['states of matter', 'state of matter', 'three states', 'matter'] },
  { level: 'P4', theme: 'Energy',       name: 'Energy forms and uses (Light)',             kw: ['light', 'shadow', 'reflection'] },
  { level: 'P4', theme: 'Energy',       name: 'Energy forms and uses (Heat)',              kw: ['heat', 'temperature', 'thermal'] },
  { level: 'P5', theme: 'Cycles',       name: 'Cycles in plants and animals (Reproduction)', kw: ['reproduction', 'reproductive', 'pollination', 'seed dispersal', 'germination'] },
  { level: 'P5', theme: 'Cycles',       name: 'Cycles in matter and water (Water)',        kw: ['water cycle', 'evaporation', 'condensation', 'boiling', 'freezing', 'water'] },
  { level: 'P5', theme: 'Systems',      name: 'Plant system (Respiratory and circulatory systems)', kw: ['plant transport', 'transport system', 'plant respiratory', 'plant circulatory'] },
  { level: 'P5', theme: 'Systems',      name: 'Human system (Respiratory and circulatory systems)', kw: ['respiratory', 'circulatory', 'circulation', 'breathing', 'blood', 'lungs'] },
  { level: 'P5', theme: 'Systems',      name: 'Electrical system',                          kw: ['electric', 'circuit', 'conductor of electricity', 'current'] },
  { level: 'P5', theme: 'Energy',       name: 'Energy forms and uses (Photosynthesis)',     kw: ['photosynthesis'] },
  { level: 'P6', theme: 'Energy',       name: 'Energy conversion',                          kw: ['energy conversion', 'energy change', 'energy transfer', 'forms of energy', 'energy'] },
  { level: 'P6', theme: 'Interactions', name: 'Interaction of forces (Frictional, gravitational, elastic spring force)', kw: ['friction', 'gravitational', 'gravity', 'elastic spring', 'spring force', 'force'] },
  { level: 'P6', theme: 'Interactions', name: 'Interactions within the environment',        kw: ['environment', 'food chain', 'food web', 'adaptation', 'adapt', 'habitat', 'ecosystem'] },
];

// Position of a question in the syllabus sequence. Builds a haystack from the
// question's topics + concepts and picks the syllabus topic whose longest
// keyword matches (longest = most specific). Unmatched questions sort last.
function syllabusRank(q) {
  const hay = [...topicsOf(q), ...conceptsOf(q)].join(' | ').toLowerCase();
  let best = -1, bestLen = 0;
  SYLLABUS_TOPICS.forEach((t, idx) => {
    t.kw.forEach(k => {
      if (k.length > bestLen && hay.includes(k)) { bestLen = k.length; best = idx; }
    });
  });
  return best === -1 ? SYLLABUS_TOPICS.length : best;
}

// Reorder only real questions using rankFn; instruction blocks keep their slot
// (same behaviour as Randomize order) so section headers stay put. The sort is
// stable — questions with an equal key keep their original relative order.
function reorderMovable(label, rankFn) {
  const movableIdx = [];
  state.questions.forEach((q, i) => { if (!isInstruction(q)) movableIdx.push(i); });
  if (movableIdx.length < 2) {
    alert('Need at least two questions to sort.');
    return;
  }
  logActivity('before ' + label);
  const decorated = movableIdx.map((i, k) => ({ q: state.questions[i], key: rankFn(state.questions[i]), k }));
  decorated.sort((a, b) => {
    if (a.key < b.key) return -1;
    if (a.key > b.key) return 1;
    return a.k - b.k;
  });
  movableIdx.forEach((origIdx, k) => { state.questions[origIdx] = decorated[k].q; });
  renderEditor(); renderPreview();
}

function sortQuestions(mode) {
  if (mode === 'syllabus') {
    reorderMovable('sort by syllabus topic', syllabusRank);
  } else if (mode === 'topic-az') {
    reorderMovable('sort alphabetically by topic', q => {
      const t = topicsOf(q);
      return t.length ? t.slice().sort()[0].toLowerCase() : '￿';
    });
  } else if (mode === 'concept-az') {
    reorderMovable('sort alphabetically by concept', q => {
      const c = conceptsOf(q);
      return c.length ? c.slice().sort()[0].toLowerCase() : '￿';
    });
  }
}

function removeQuestion(i) {
  state.questions.splice(i, 1);
  renderEditor(); renderPreview();
}
function moveQuestion(i, dir) {
  const j = i + dir;
  if (j < 0 || j >= state.questions.length) return;
  [state.questions[i], state.questions[j]] = [state.questions[j], state.questions[i]];
  renderEditor(); renderPreview();
}
function addElement(q, type) {
  q.elements.push(makeElement(type));
  renderEditor(); renderPreview();
}
function removeElement(q, i) {
  q.elements.splice(i, 1);
  renderEditor(); renderPreview();
}
function moveElement(q, i, dir) {
  // The first text element is rendered as the question stem (in the header),
  // not as a body block — step over it so an up/down move always lands on
  // another visible block instead of silently swapping with the stem.
  const stemIdx = q.elements.findIndex(e => e.type === 'text');
  let j = i + dir;
  if (j === stemIdx) j += dir;
  if (j < 0 || j >= q.elements.length) return;
  [q.elements[i], q.elements[j]] = [q.elements[j], q.elements[i]];
  renderEditor(); renderPreview();
}

/* =========================================================================
   PREVIEW RENDER  (matches index.html question-card structure)
   ========================================================================= */
const previewContainer = document.getElementById('previewContainer');
const previewTitleEl = document.getElementById('previewTitle');
const previewSubtitleEl = document.getElementById('previewSubtitle');

function renderPreview() {
  scheduleAutoSave();
  ensureCoverPreview();
  const coverOn = !!getCover().enabled;
  // The cover page replaces the worksheet's own title row — hide the h2
  // header so the cover isn't followed by a duplicate title.
  const previewHeader = document.querySelector('.preview-pane > .preview-header');
  if (previewHeader) previewHeader.style.display = coverOn ? 'none' : '';
  previewTitleEl.textContent = state.title || 'Untitled Worksheet';
  previewSubtitleEl.textContent = state.subtitle || '';
  previewSubtitleEl.style.display = state.subtitle ? 'block' : 'none';

  previewContainer.innerHTML = '';

  if (state.questions.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    empty.textContent = 'Your worksheet preview will appear here.';
    previewContainer.appendChild(empty);
    if (isAdmin()) previewContainer.appendChild(buildQuestionInsertBar(-1));
    return;
  }

  // "Add question here" bars between cards — admin only, and only when no
  // filter is active (with a filter, blank new questions would be hidden).
  const showQIns = isAdmin() && !filterTopic.trim() && !filterConcept.trim();
  let shown = 0;
  if (showQIns) previewContainer.appendChild(buildQuestionInsertBar(-1));
  state.questions.forEach((q, qIndex) => {
    if (!questionMatchesFilter(q)) return;
    shown++;
    previewContainer.appendChild(renderPreviewQuestion(q, qIndex));
    if (showQIns) previewContainer.appendChild(buildQuestionInsertBar(qIndex));
  });
  if (shown === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    empty.textContent = 'No questions match the current topic / concept filter.';
    previewContainer.appendChild(empty);
  }
  if (practiceMode && shown > 0) previewContainer.appendChild(buildPracticeBar());
  updateFilterCount(shown);
}

// A bar between question cards: inserts a new block after `afterIndex`
// (use -1 to insert at the very top). A block can be a blank question or an
// instruction banner. Question numbers re-flow automatically.
function buildQuestionInsertBar(afterIndex) {
  const bar = document.createElement('div');
  bar.className = 'q-insert-bar';
  const mkBtn = (label, make) => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'q-insert-btn';
    btn.textContent = label;
    btn.addEventListener('click', () => {
      state.questions.splice(afterIndex + 1, 0, make());
      renderEditor();
      renderPreview();
    });
    return btn;
  };
  bar.appendChild(mkBtn('+ Add question here', makeQuestion));
  bar.appendChild(mkBtn('+ Add instruction here', makeInstruction));
  return bar;
}

function questionHasAnswerKey(q) {
  return q.elements.some(e => e.type === 'answerKey' && ((e.text && e.text.trim()) || e.dataUrl));
}
function questionHasVideo(q) {
  return q.elements.some(e => e.type === 'video' && e.url && e.url.trim());
}

function renderPreviewQuestion(q, qIndex) {
  if (isInstruction(q)) return renderInstructionBlock(q, qIndex);

  const card = document.createElement('article');
  card.className = 'question-card';

  // Per-question controls — admin only: move, copy to draft, delete.
  if (isAdmin()) {
    const qc = document.createElement('div');
    qc.className = 'pv-q-controls';
    qc.appendChild(makeIconBtn('↑', 'Move question up', () => moveQuestion(qIndex, -1)));
    qc.appendChild(makeIconBtn('↓', 'Move question down', () => moveQuestion(qIndex, 1)));
    qc.appendChild(makeIconBtn('📋', 'Copy this question to the draft worksheet', () => copyQuestionToDraft(qIndex)));
    qc.appendChild(makeIconBtn('✕', 'Delete this question', () => {
      if (confirm('Delete this entire question?')) removeQuestion(qIndex);
    }, true));
    card.appendChild(qc);
  }

  // Topic / concept tags — admin only. Never rendered for students or exports.
  if (isAdmin()) {
    const tags = document.createElement('div');
    tags.className = 'question-tags';
    buildTagGroup(tags, 'Topic', q, 'topics');
    buildTagGroup(tags, 'Concept', q, 'concepts');
    card.appendChild(tags);
  }

  const header = document.createElement('div');
  header.className = 'question-header';

  const num = document.createElement('div');
  num.className = 'question-number';
  num.textContent = questionDisplayNumber(qIndex);
  header.appendChild(num);

  // First text element acts as the stem; otherwise use a blank placeholder
  const firstText = q.elements.find(e => e.type === 'text');
  const stem = document.createElement('div');
  stem.className = 'question-stem';
  stem.innerHTML = formatTextWithFractions(firstText ? firstText.text : '');
  if (previewEditingEnabled()) {
    attachInlineText(stem,
      () => {
        const t = q.elements.find(e => e.type === 'text');
        return t ? t.text : '';
      },
      (v) => {
        let t = q.elements.find(e => e.type === 'text');
        if (!t) {
          if (!v) return;
          t = makeElement('text');
          q.elements.unshift(t);
        }
        t.text = v;
      },
      'Question text — click to edit');
  }
  header.appendChild(stem);

  card.appendChild(header);

  const hasAnswer = questionHasAnswerKey(q);
  const hasVideo = questionHasVideo(q);
  const showAnswerFor = showAnswers || revealedAnswers.has(q.id);
  const showVideoFor = showAnswers || revealedVideos.has(q.id);

  const actions = document.createElement('div');
  actions.className = 'reveal-actions';

  const ansBtn = document.createElement('button');
  ansBtn.className = 'btn btn-tiny';
  ansBtn.type = 'button';
  ansBtn.textContent = showAnswerFor ? 'Hide answer' : 'Show answer';
  ansBtn.disabled = !hasAnswer;
  if (!hasAnswer) ansBtn.title = 'No answer key for this question';
  ansBtn.addEventListener('click', () => {
    if (revealedAnswers.has(q.id)) revealedAnswers.delete(q.id);
    else revealedAnswers.add(q.id);
    renderPreview();
  });
  actions.appendChild(ansBtn);

  const vidBtn = document.createElement('button');
  vidBtn.className = 'btn btn-tiny';
  vidBtn.type = 'button';
  vidBtn.textContent = showVideoFor ? 'Hide video' : 'Show video walkthrough';
  vidBtn.disabled = !hasVideo;
  if (!hasVideo) vidBtn.title = 'No video walkthrough for this question';
  vidBtn.addEventListener('click', () => {
    if (revealedVideos.has(q.id)) revealedVideos.delete(q.id);
    else revealedVideos.add(q.id);
    renderPreview();
  });
  actions.appendChild(vidBtn);

  const hasSource = !!(q.source && q.source.trim());
  const sourceShown = showSources || revealedSources.has(q.id);
  const srcBtn = document.createElement('button');
  srcBtn.className = 'btn btn-tiny';
  srcBtn.type = 'button';
  srcBtn.textContent = sourceShown ? 'Hide source' : 'Show source';
  srcBtn.disabled = !hasSource;
  if (!hasSource) srcBtn.title = 'No source recorded for this question';
  srcBtn.addEventListener('click', () => {
    if (revealedSources.has(q.id)) revealedSources.delete(q.id);
    else revealedSources.add(q.id);
    renderPreview();
  });
  actions.appendChild(srcBtn);

  const canEdit = previewEditingEnabled();
  // Insert bar right after the stem, so an element can be added at the top.
  if (canEdit) card.appendChild(buildInsertBar(q, q.elements.indexOf(firstText)));

  let stemConsumed = false;
  q.elements.forEach((el, idx) => {
    if (el.type === 'text' && !stemConsumed) {
      stemConsumed = true;
      return;
    }
    const rendered = renderPreviewElement(el, { showAnswerFor, showVideoFor });
    if (canEdit) {
      // Wrap so each element gets hover controls (remove image / remove element).
      const wrap = document.createElement('div');
      wrap.className = 'pv-el';
      wrap.appendChild(rendered);
      wrap.appendChild(buildElementControls(q, idx, el));
      card.appendChild(wrap);
      // Insert bar after each element, to add a new element right below it.
      card.appendChild(buildInsertBar(q, idx));
    } else {
      card.appendChild(rendered);
    }
  });

  // Caption showing which school / year the question came from.
  if (q.source && (showSources || revealedSources.has(q.id))) {
    const src = document.createElement('div');
    src.className = 'question-source';
    src.textContent = 'From: ' + q.source;
    card.appendChild(src);
  }

  // Reveal controls sit at the very bottom of the question.
  card.appendChild(actions);

  return card;
}

// An instruction banner between questions: editable text, no number, no
// reveal controls. Can be moved up / down and deleted like a question.
function renderInstructionBlock(q, qIndex) {
  const card = document.createElement('article');
  card.className = 'question-card instruction-block';

  if (isAdmin()) {
    const qc = document.createElement('div');
    qc.className = 'pv-q-controls';
    qc.appendChild(makeIconBtn('↑', 'Move instruction up', () => moveQuestion(qIndex, -1)));
    qc.appendChild(makeIconBtn('↓', 'Move instruction down', () => moveQuestion(qIndex, 1)));
    qc.appendChild(makeIconBtn('✕', 'Delete this instruction', () => {
      if (confirm('Delete this instruction block?')) removeQuestion(qIndex);
    }, true));
    card.appendChild(qc);
  }

  let textEl = q.elements.find(e => e.type === 'text');
  if (!textEl) { textEl = makeElement('text'); q.elements.unshift(textEl); }

  const body = document.createElement('div');
  body.className = 'instruction-text';
  body.innerHTML = formatTextWithFractions(textEl.text || '');
  if (previewEditingEnabled()) {
    attachInlineText(body,
      () => textEl.text || '',
      (v) => { textEl.text = v; },
      'Instruction text — click to edit');
  }
  card.appendChild(body);

  return card;
}

/* =========================================================================
   INLINE PREVIEW EDITING
   The right-hand preview is fully editable for the admin (same gate as the
   left-hand editor). Text nodes become contenteditable; image areas accept
   paste / drop just like the editor's paste zones.
   ========================================================================= */
function previewEditingEnabled() {
  // Matches the left-hand editor: only the admin can author worksheets.
  // Practice mode is always read-only, even for the admin.
  return isAdmin() && !practiceMode;
}

function applyImageFile(file, onDone) {
  if (!file || !file.type || !file.type.startsWith('image/')) return false;
  const reader = new FileReader();
  reader.onload = () => onDone(reader.result);
  reader.readAsDataURL(file);
  return true;
}

// Make a rendered text node editable in place. While focused it shows the raw
// text (so a typed "3/4" stays editable); on blur it re-renders with fractions
// and syncs the left-hand editor.
function attachInlineText(displayEl, getRaw, setRaw, placeholder) {
  displayEl.classList.add('pv-editable');
  displayEl.setAttribute('contenteditable', 'true');
  displayEl.setAttribute('spellcheck', 'false');
  if (placeholder) displayEl.dataset.placeholder = placeholder;
  const readBack = () => displayEl.innerText.replace(/\n$/, '');
  displayEl.addEventListener('focus', () => {
    displayEl.textContent = getRaw() || '';
  });
  displayEl.addEventListener('input', () => {
    setRaw(readBack());
    scheduleAutoSave();
  });
  displayEl.addEventListener('blur', () => {
    // Re-render only this node (with fractions) so other editable fields in
    // the preview aren't destroyed — that would swallow a click moving
    // straight from one field to another. The left editor is rebuilt so it
    // stays in sync with the model.
    const raw = readBack();
    setRaw(raw);
    displayEl.innerHTML = formatTextWithFractions(raw);
    renderEditor();
    scheduleAutoSave();
  });
  displayEl.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') { e.preventDefault(); displayEl.blur(); }
  });
  return displayEl;
}

// Turn an element into an image paste / drop target writing to el.dataUrl.
function attachImagePaste(zoneEl, el) {
  zoneEl.classList.add('pv-image-zone');
  zoneEl.tabIndex = 0;
  zoneEl.title = 'Click here, then paste an image (Ctrl+V / ⌘+V) — or drop one';
  const commit = (url) => {
    el.dataUrl = url;
    el.imageRef = null; // dropped image content invalidates any previous ref
    renderEditor();
    renderPreview();
    // Fire-and-forget: hash & upload now so the next save is tiny.
    if (typeof kickoffImageUploads === 'function') {
      kickoffImageUploads().catch(() => {});
    }
  };
  // When a diagram already has an image, confirm before replacing it.
  const okToReplace = () =>
    !el.dataUrl || confirm('This diagram already has an image.\n\nReplace it with the image you just pasted?');
  zoneEl.addEventListener('click', (e) => {
    // Don't steal focus from an editable child (e.g. the caption).
    if (e.target !== zoneEl && e.target.isContentEditable) return;
    zoneEl.focus();
  });
  zoneEl.addEventListener('paste', (e) => {
    const items = (e.clipboardData && e.clipboardData.items) || [];
    for (const it of items) {
      if (it.type && it.type.startsWith('image/')) {
        e.preventDefault();
        if (!okToReplace()) return;
        applyImageFile(it.getAsFile(), commit);
        return;
      }
    }
  });
  zoneEl.addEventListener('dragover', (e) => { e.preventDefault(); });
  zoneEl.addEventListener('drop', (e) => {
    e.preventDefault();
    const file = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
    if (!file || !file.type || !file.type.startsWith('image/')) return;
    if (!okToReplace()) return;
    applyImageFile(file, commit);
  });
}

// A small editable "Topic / Concept" pill shown above each question (admin only).
function makeTagPill(key, getRaw, setRaw, onRemove) {
  const tag = document.createElement('span');
  tag.className = 'qtag';
  const k = document.createElement('span');
  k.className = 'qtag-key';
  k.textContent = key;
  const val = document.createElement('span');
  val.className = 'qtag-val';
  val.textContent = getRaw();
  attachInlineText(val, getRaw, setRaw, 'add…');
  tag.appendChild(k);
  tag.appendChild(val);
  if (onRemove) {
    const x = document.createElement('button');
    x.type = 'button';
    x.className = 'qtag-remove';
    x.textContent = '✕';
    x.title = 'Remove';
    x.addEventListener('click', onRemove);
    tag.appendChild(x);
  }
  return tag;
}

// Build the editable pills for one kind ('topics' / 'concepts') plus a "+" pill.
function buildTagGroup(container, label, q, kind) {
  const get = () => kind === 'topics' ? rawTopics(q) : rawConcepts(q);
  const set = (arr) => kind === 'topics' ? setTopics(q, arr) : setConcepts(q, arr);
  const values = get();
  const display = values.length ? values : [''];
  display.forEach((val, i) => {
    container.appendChild(makeTagPill(
      label,
      () => get()[i] || '',
      (v) => {
        const arr = get().slice();
        while (arr.length <= i) arr.push('');
        arr[i] = v;
        set(arr);
      },
      values.length > 1 ? () => {
        const arr = get().slice();
        arr.splice(i, 1);
        set(arr);
        renderEditor();
        renderPreview();
      } : null
    ));
  });
  const add = document.createElement('button');
  add.type = 'button';
  add.className = 'qtag qtag-add';
  add.textContent = '+ ' + label;
  add.title = 'Add another ' + label.toLowerCase();
  add.addEventListener('click', () => {
    const arr = get().slice();
    arr.push('');
    set(arr);
    renderEditor();
    renderPreview();
  });
  container.appendChild(add);
}

// A slim bar between preview segments. Clicking "+" reveals element-type
// buttons that insert a new element right after position `afterIndex`.
const INSERT_TYPES = [
  ['Text', 'text'], ['Image', 'image'], ['Part', 'part'], ['MCQ', 'mcq'],
  ['Answer field', 'answer'], ['Open-ended box', 'openLines'],
  ['Working space', 'workingSpace'], ['Page break', 'pageBreak'],
  ['Answer key', 'answerKey'], ['Video', 'video']
];
function buildInsertBar(q, afterIndex) {
  const bar = document.createElement('div');
  bar.className = 'insert-bar';
  const toggle = document.createElement('button');
  toggle.type = 'button';
  toggle.className = 'insert-toggle';
  toggle.textContent = '+';
  toggle.title = 'Add an element here';
  toggle.addEventListener('click', () => bar.classList.toggle('open'));
  bar.appendChild(toggle);
  const menu = document.createElement('div');
  menu.className = 'insert-menu';
  INSERT_TYPES.forEach(([label, type]) => {
    const b = document.createElement('button');
    b.type = 'button';
    b.className = 'insert-menu-btn';
    b.textContent = '+ ' + label;
    b.addEventListener('click', () => {
      q.elements.splice(afterIndex + 1, 0, makeElement(type));
      renderEditor();
      renderPreview();
    });
    menu.appendChild(b);
  });
  bar.appendChild(menu);
  return bar;
}

// Hover controls for a preview element: remove its pasted image (if any) and
// remove the whole element block.
function buildElementControls(q, idx, el) {
  const bar = document.createElement('div');
  bar.className = 'pv-el-controls';

  // Move this block up / down within the question.
  const mkMove = (glyph, title, dir) => {
    const b = document.createElement('button');
    b.type = 'button';
    b.className = 'pv-el-btn';
    b.textContent = glyph;
    b.title = title;
    b.addEventListener('click', () => moveElement(q, idx, dir));
    return b;
  };
  bar.appendChild(mkMove('↑', 'Move this block up', -1));
  bar.appendChild(mkMove('↓', 'Move this block down', 1));

  if ((el.type === 'image' || el.type === 'answerKey') && el.dataUrl) {
    const scale = clampImgScale(el.scale ?? 1.0);
    const mkScale = (txt, title, delta) => {
      const b = document.createElement('button');
      b.type = 'button';
      b.className = 'pv-el-btn';
      b.textContent = txt;
      b.title = title;
      b.addEventListener('click', (e) => {
        e.stopPropagation();
        el.scale = clampImgScale((el.scale ?? 1.0) + delta);
        renderPreview();
      });
      return b;
    };
    const shrink = mkScale('−', `Shrink image (currently ${Math.round(scale*100)}%)`, -IMG_SCALE_STEP);
    const grow = mkScale('+', `Enlarge image (currently ${Math.round(scale*100)}%)`, +IMG_SCALE_STEP);
    shrink.disabled = scale <= IMG_SCALE_MIN + 1e-9;
    grow.disabled = scale >= IMG_SCALE_MAX - 1e-9;
    bar.appendChild(shrink);
    bar.appendChild(grow);

    const rmImg = document.createElement('button');
    rmImg.type = 'button';
    rmImg.className = 'pv-el-btn';
    rmImg.textContent = '✕ Image';
    rmImg.title = 'Remove the pasted image (keeps the empty paste-zone)';
    rmImg.addEventListener('click', () => {
      el.dataUrl = '';
      renderPreview();
    });
    bar.appendChild(rmImg);
  }
  const rmEl = document.createElement('button');
  rmEl.type = 'button';
  rmEl.className = 'pv-el-btn pv-el-btn-danger';
  rmEl.textContent = '🗑 Remove';
  rmEl.title = 'Remove this whole element';
  rmEl.addEventListener('click', () => {
    if (confirm('Remove this whole element from the question?')) {
      q.elements.splice(idx, 1);
      renderPreview();
    }
  });
  bar.appendChild(rmEl);
  return bar;
}

function renderPreviewElement(el, ctx = {}) {
  const showAnswerFor = ctx.showAnswerFor ?? showAnswers;
  const showVideoFor = ctx.showVideoFor ?? showAnswers;
  const editable = previewEditingEnabled();
  switch (el.type) {
    case 'text': {
      const d = document.createElement('div');
      d.className = 'question-sub';
      d.innerHTML = formatTextWithFractions(el.text);
      if (editable) attachInlineText(d, () => el.text || '', (v) => { el.text = v; }, 'Empty text — click to edit');
      return d;
    }
    case 'image': {
      const wrap = document.createElement('div');
      wrap.className = 'question-image';
      const scale = clampImgScale(el.scale ?? 1.0);
      if (el.dataUrl) {
        const img = document.createElement('img');
        img.src = el.dataUrl;
        img.alt = el.caption || '';
        img.style.width = (scale * 100) + '%';
        wrap.appendChild(img);
      } else {
        const placeholder = document.createElement('div');
        placeholder.style.cssText = 'padding:24px; border:2px dashed var(--border-medium); border-radius:var(--radius-md); color:var(--text-tertiary); font-size:var(--font-size-sm);';
        placeholder.textContent = editable
          ? 'Click here, then paste an image (Ctrl+V / ⌘+V)'
          : '(image not yet pasted)';
        wrap.appendChild(placeholder);
      }
      if (editable) attachImagePaste(wrap, el);
      if (editable && el.dataUrl) {
        const ctrl = document.createElement('div');
        ctrl.className = 'image-scale-ctrl';
        const mk = (txt, title, delta) => {
          const b = document.createElement('button');
          b.type = 'button';
          b.className = 'image-scale-btn';
          b.textContent = txt;
          b.title = title;
          b.addEventListener('click', (e) => {
            e.stopPropagation();
            el.scale = clampImgScale((el.scale ?? 1.0) + delta);
            renderPreview();
          });
          return b;
        };
        const minus = mk('−', 'Shrink image', -IMG_SCALE_STEP);
        const plus = mk('+', 'Enlarge image', +IMG_SCALE_STEP);
        minus.disabled = scale <= IMG_SCALE_MIN + 1e-9;
        plus.disabled = scale >= IMG_SCALE_MAX - 1e-9;
        const label = document.createElement('span');
        label.className = 'image-scale-label';
        label.textContent = Math.round(scale * 100) + '%';
        ctrl.appendChild(minus);
        ctrl.appendChild(label);
        ctrl.appendChild(plus);
        const wrapCtrl = document.createElement('div');
        wrapCtrl.style.textAlign = 'center';
        wrapCtrl.appendChild(ctrl);
        wrap.appendChild(wrapCtrl);
      }
      if (el.caption || editable) {
        const cap = document.createElement('div');
        cap.style.cssText = 'margin-top:8px; font-size:var(--font-size-sm); color:var(--text-secondary); text-align:center;';
        cap.textContent = el.caption || '';
        if (editable) attachInlineText(cap, () => el.caption || '', (v) => { el.caption = v; }, 'Add a caption…');
        wrap.appendChild(cap);
      }
      return wrap;
    }
    case 'part': {
      const row = document.createElement('div');
      row.className = 'part-stem';
      const marker = document.createElement('span');
      marker.className = 'part-marker';
      marker.textContent = el.label || '';
      const text = document.createElement('span');
      text.className = 'part-text';
      text.innerHTML = formatTextWithFractions(el.text || '');
      if (editable) {
        attachInlineText(marker, () => el.label || '', (v) => { el.label = v; }, '(a)');
        attachInlineText(text, () => el.text || '', (v) => { el.text = v; }, 'Part text — click to edit');
      }
      row.appendChild(marker);
      row.appendChild(text);
      return row;
    }
    case 'mcq': {
      const list = document.createElement('div');
      list.className = 'options-list';
      el.options.forEach((opt, i) => {
        const item = document.createElement('div');
        item.className = 'option-item';
        if (showAnswers && el.correctId === opt.id) {
          item.classList.add('correct-preview');
        }
        if (practiceMode) {
          const selected = practiceResponses.get(el.id) === opt.id;
          if (selected) item.classList.add('selected');
          if (practiceChecked && el.correctId) {
            if (opt.id === el.correctId) item.classList.add('correct-answer');
            else if (selected) item.classList.add('wrong-answer');
          } else if (!practiceChecked) {
            item.style.cursor = 'pointer';
            item.addEventListener('click', () => {
              practiceResponses.set(el.id, opt.id);
              renderPreview();
            });
          }
        }
        const radio = document.createElement('div');
        radio.className = 'option-radio';
        if (editable) {
          radio.classList.add('pv-radio');
          radio.title = 'Mark this option as the correct answer';
          radio.addEventListener('click', () => {
            el.correctId = opt.id;
            renderEditor();
            renderPreview();
          });
        }
        item.appendChild(radio);

        const label = document.createElement('div');
        label.className = 'option-label';
        const marker = document.createElement('span');
        marker.className = 'option-marker';
        marker.textContent = String.fromCharCode(65 + i);
        label.appendChild(marker);
        const optText = document.createElement('span');
        optText.innerHTML = formatTextWithFractions(opt.text || '');
        if (editable) attachInlineText(optText, () => opt.text || '', (v) => { opt.text = v; }, 'Option text');
        label.appendChild(optText);
        item.appendChild(label);

        list.appendChild(item);
      });
      return list;
    }
    case 'answer': {
      const row = document.createElement('div');
      row.className = 'answer-field';
      const prefix = document.createElement('span');
      prefix.className = 'answer-field-prefix';
      prefix.textContent = el.label || 'Ans :';
      if (editable) attachInlineText(prefix, () => el.label || '', (v) => { el.label = v; }, 'Ans :');
      row.appendChild(prefix);

      if (practiceMode) {
        const input = document.createElement('input');
        input.type = 'text';
        input.className = 'practice-answer-input';
        input.placeholder = 'Type your answer…';
        input.value = practiceResponses.get(el.id) || '';
        input.disabled = practiceChecked;
        input.addEventListener('input', () => { practiceResponses.set(el.id, input.value); });
        if (practiceChecked && el.answer) {
          const expected = normalizeAnswer(el.answer);
          const got = normalizeAnswer(input.value);
          if (got && got === expected) input.classList.add('correct');
          else if (got) input.classList.add('wrong');
        }
        row.appendChild(input);
        if (practiceChecked && el.answer) {
          const wrap = document.createElement('div');
          wrap.appendChild(row);
          const model = document.createElement('div');
          model.className = 'practice-model-answer';
          model.innerHTML = '<strong>Suggested answer:</strong> ' + formatTextWithFractions(el.answer);
          wrap.appendChild(model);
          return wrap;
        }
        return row;
      }

      const line = document.createElement('span');
      line.className = 'answer-field-line';
      if (showAnswers && el.answer) {
        line.classList.add('filled');
        line.innerHTML = formatTextWithFractions(el.answer);
      } else {
        line.innerHTML = '&nbsp;';
      }
      row.appendChild(line);
      return row;
    }
    case 'openLines': {
      const n = clampLines(el.lines);
      const wrap = document.createElement('div');
      wrap.className = 'open-lines-wrap';

      if (editable) {
        const ctrl = document.createElement('div');
        ctrl.className = 'open-lines-inline-ctrl';
        const mk = (txt, title, delta) => {
          const b = document.createElement('button');
          b.type = 'button';
          b.className = 'open-lines-step-btn';
          b.textContent = txt;
          b.title = title;
          b.addEventListener('click', () => {
            el.lines = clampLines((el.lines || 4) + delta);
            renderPreview();
          });
          return b;
        };
        const label = document.createElement('span');
        label.className = 'open-lines-inline-label';
        label.textContent = `${n} line${n === 1 ? '' : 's'}`;
        ctrl.appendChild(mk('−', 'Remove a line', -1));
        ctrl.appendChild(label);
        ctrl.appendChild(mk('+', 'Add a line', +1));
        wrap.appendChild(ctrl);
      }

      const box = document.createElement('div');
      box.className = 'open-lines-box';
      if (practiceMode) {
        const ta = document.createElement('textarea');
        ta.className = 'open-lines-textarea';
        ta.rows = n;
        ta.style.height = (n * 30) + 'px';
        ta.placeholder = 'Write your answer here…';
        ta.value = practiceResponses.get(el.id) || '';
        ta.disabled = practiceChecked;
        ta.addEventListener('input', () => { practiceResponses.set(el.id, ta.value); });
        box.appendChild(ta);
      } else {
        for (let i = 0; i < n; i++) {
          const row = document.createElement('div');
          row.className = 'open-lines-row';
          box.appendChild(row);
        }
      }
      wrap.appendChild(box);
      return wrap;
    }
    case 'workingSpace': {
      const n = clampLines(el.lines);
      const wrap = document.createElement('div');
      wrap.className = 'working-space-wrap';

      if (editable) {
        const ctrl = document.createElement('div');
        ctrl.className = 'open-lines-inline-ctrl';
        const mk = (txt, title, delta) => {
          const b = document.createElement('button');
          b.type = 'button';
          b.className = 'open-lines-step-btn';
          b.textContent = txt;
          b.title = title;
          b.addEventListener('click', () => {
            el.lines = clampLines((el.lines || 6) + delta);
            renderPreview();
          });
          return b;
        };
        const label = document.createElement('span');
        label.className = 'open-lines-inline-label';
        label.textContent = `Working space — ${n} line${n === 1 ? '' : 's'} tall`;
        ctrl.appendChild(mk('−', 'Shrink the box', -1));
        ctrl.appendChild(label);
        ctrl.appendChild(mk('+', 'Grow the box', +1));
        wrap.appendChild(ctrl);
      }

      const box = document.createElement('div');
      box.className = 'working-space-box';
      box.style.minHeight = (n * 30) + 'px';
      if (practiceMode) {
        const ta = document.createElement('textarea');
        ta.className = 'working-space-textarea';
        ta.rows = n;
        ta.style.height = (n * 30) + 'px';
        ta.placeholder = 'Show your working here…';
        ta.value = practiceResponses.get(el.id) || '';
        ta.disabled = practiceChecked;
        ta.addEventListener('input', () => { practiceResponses.set(el.id, ta.value); });
        box.appendChild(ta);
      }
      wrap.appendChild(box);
      return wrap;
    }
    case 'answerKey': {
      const block = document.createElement('div');
      block.className = 'answer-key';
      if (!showAnswerFor) {
        block.classList.add('hidden-from-student');
        const t = document.createElement('div');
        t.className = 'answer-key-title';
        t.textContent = 'Answer key (hidden)';
        block.appendChild(t);
        return block;
      }
      const t = document.createElement('div');
      t.className = 'answer-key-title';
      t.textContent = 'Answer key';
      block.appendChild(t);
      if (editable) {
        const ta = document.createElement('textarea');
        ta.className = 'pv-link-editor-input answer-key-textarea';
        ta.placeholder = 'Paste the answer key text here…\n(e.g. (a) 42\\n(b) Because the velocity is constant.)';
        ta.value = el.text || '';
        ta.rows = Math.max(3, Math.min(12, (el.text || '').split('\n').length + 1));
        ta.addEventListener('input', () => {
          el.text = ta.value;
          scheduleAutoSave();
        });
        ta.addEventListener('blur', () => { renderPreview(); });
        block.appendChild(ta);
      } else if (el.text && el.text.trim()) {
        const body = document.createElement('div');
        body.className = 'answer-key-body';
        body.innerHTML = formatTextWithFractions(el.text || '');
        block.appendChild(body);
      }
      if (el.dataUrl) {
        const img = document.createElement('img');
        img.className = 'answer-key-image';
        img.src = el.dataUrl;
        img.alt = 'Answer key screenshot';
        if (editable) attachImagePaste(img, el);
        block.appendChild(img);
      } else if (editable) {
        const zone = document.createElement('div');
        zone.style.cssText = 'margin-top:8px; padding:14px; border:2px dashed var(--border-medium); border-radius:var(--radius-md); color:var(--text-tertiary); font-size:var(--font-size-sm); text-align:center; background:var(--bg-primary);';
        zone.textContent = 'Click here, then paste an answer-key screenshot';
        attachImagePaste(zone, el);
        block.appendChild(zone);
      }
      return block;
    }
    case 'video': {
      const wrap = document.createElement('div');
      wrap.className = 'video-block';
      if (!showVideoFor) {
        const ph = document.createElement('div');
        ph.className = 'video-placeholder';
        ph.textContent = '▶ Video walkthrough (click "Show video walkthrough" to play)';
        wrap.appendChild(ph);
        return wrap;
      }

      if (editable) {
        const editor = document.createElement('div');
        editor.className = 'pv-link-editor';
        const lbl = document.createElement('label');
        lbl.className = 'pv-link-editor-label';
        lbl.textContent = 'Paste Dropbox or Google Drive share link';
        editor.appendChild(lbl);
        const urlInput = document.createElement('input');
        urlInput.type = 'text';
        urlInput.className = 'pv-link-editor-input';
        urlInput.value = el.url || '';
        urlInput.placeholder = 'https://www.dropbox.com/… or https://drive.google.com/…';
        urlInput.addEventListener('input', () => {
          el.url = urlInput.value;
          scheduleAutoSave();
        });
        urlInput.addEventListener('change', () => { renderPreview(); });
        urlInput.addEventListener('blur', () => { renderPreview(); });
        urlInput.addEventListener('paste', () => {
          setTimeout(() => { el.url = urlInput.value; renderPreview(); }, 0);
        });
        editor.appendChild(urlInput);
        wrap.appendChild(editor);
      }

      const embed = toEmbeddableVideoUrl(el.url || '');
      if (!embed) {
        if (!editable) {
          const ph = document.createElement('div');
          ph.className = 'video-placeholder';
          ph.textContent = '(no video link yet)';
          wrap.appendChild(ph);
        }
      } else if (embed.kind === 'native') {
        const v = document.createElement('video');
        v.src = embed.url;
        v.controls = true;
        v.preload = 'metadata';
        wrap.appendChild(v);
      } else {
        const ifr = document.createElement('iframe');
        ifr.src = embed.url;
        ifr.allow = 'autoplay; fullscreen';
        ifr.allowFullscreen = true;
        wrap.appendChild(ifr);
      }
      if (el.caption || editable) {
        const cap = document.createElement('div');
        cap.className = 'video-caption';
        cap.textContent = el.caption || '';
        if (editable) attachInlineText(cap, () => el.caption || '', (v) => { el.caption = v; }, 'Add a caption…');
        wrap.appendChild(cap);
      }
      return wrap;
    }
    case 'pageBreak': {
      const wrap = document.createElement('div');
      wrap.className = 'page-break-marker';
      const label = document.createElement('span');
      label.className = 'page-break-marker-label';
      label.textContent = 'PDF page break — “Continued from previous page” on the next page';
      wrap.appendChild(label);
      return wrap;
    }
  }
}

/* Turn Dropbox / Google Drive share links into something playable in-page.
   - https://www.dropbox.com/.../file.mp4?dl=0  →  ...?raw=1  (native <video>)
   - https://www.dropbox.com/scl/fi/... (no clear extension)  →  iframe via dl.dropboxusercontent.com
   - https://drive.google.com/file/d/<ID>/view?...           →  iframe at /file/d/<ID>/preview
   - https://drive.google.com/open?id=<ID>                   →  iframe at /file/d/<ID>/preview
   - Other URLs: if they end with a video extension, play natively; else iframe. */
function toEmbeddableVideoUrl(raw) {
  const url = (raw || '').trim();
  if (!url) return null;
  const isVideoExt = /\.(mp4|webm|ogg|mov|m4v)(\?|$)/i.test(url);
  if (/drive\.google\.com/.test(url)) {
    let id = '';
    const m1 = url.match(/\/file\/d\/([^/?#]+)/);
    const m2 = url.match(/[?&]id=([^&]+)/);
    if (m1) id = m1[1];
    else if (m2) id = m2[1];
    if (id) return { kind: 'iframe', url: `https://drive.google.com/file/d/${id}/preview` };
    return { kind: 'iframe', url };
  }
  let normalized = url;
  if (/dropbox\.com/.test(url)) {
    normalized = url
      .replace(/^https?:\/\/www\.dropbox\.com/, 'https://dl.dropboxusercontent.com')
      .replace(/[?&]dl=0/, '')
      .replace(/[?&]dl=1/, '');
    normalized += (normalized.includes('?') ? '&' : '?') + 'raw=1';
    if (isVideoExt) return { kind: 'native', url: normalized };
    return { kind: 'iframe', url: normalized };
  }
  if (isVideoExt) return { kind: 'native', url: normalized };
  return { kind: 'iframe', url: normalized };
}

/* =========================================================================
   EXPORT — standalone worksheet HTML (paste-able images embedded as data URLs)
   ========================================================================= */
// Standalone exports embed images as base64 so the file works offline. If
// some images are still Storage refs (just URLs), pull the bytes and inline
// them before building the export. No-op when every image is already a
// proper data URL.
async function resolveImagesForExport() {
  const els = imageElements(state).filter((el) =>
    el.imageRef && el.imageRef.path && (!el.dataUrl || !el.dataUrl.startsWith('data:'))
  );
  if (els.length === 0) return;
  await Promise.allSettled(els.map(async (el) => {
    try {
      const bytes = await retrying('export: fetch image bytes',
        () => getBytes(storageRef(fbStorage, el.imageRef.path)),
        { attempts: 2, timeoutMs: 15000 });
      let bin = '';
      const a = new Uint8Array(bytes);
      for (let i = 0; i < a.length; i++) bin += String.fromCharCode(a[i]);
      el.dataUrl = `data:${el.imageRef.mime || 'image/png'};base64,${btoa(bin)}`;
    } catch (e) {
      console.warn('Could not inline image for export:', e && (e.message || e));
    }
  }));
}

async function exportHtml() {
  await resolveImagesForExport();
  const html = buildStandaloneHtml();
  const blob = new Blob([html], { type: 'text/html' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = (state.title || 'worksheet').replace(/[^a-z0-9_-]+/gi, '_').toLowerCase() + '.html';
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}

/* =========================================================================
   PDF EXPORT — opens a print-friendly window (one question per page,
   ruled working space) and triggers the browser's print-to-PDF dialog.
   ========================================================================= */
async function exportPdf() {
  await resolveImagesForExport();
  const html = buildPrintableHtml();
  const w = window.open('', '_blank');
  if (!w) {
    alert('Please allow pop-ups to export PDF.');
    return;
  }
  w.document.open();
  w.document.write(html);
  w.document.close();
}

  const blankPage = coverOn ? `<section class="cover-blank-print" aria-hidden="true"></section>` : '';
  const printHeader = coverOn ? '' : `

    return Promise.all(imgs.map(img => {
      if (img.complete && img.naturalWidth > 0) return Promise.resolve();
      return new Promise(res => {

function questionToPrintHtml(q, qIndex) {
  if (isInstruction(q)) {
    const t = q.elements.find(e => e.type === 'text');
    return `
<section class="print-instruction">
  <article class="question-card instruction-block">
    <div class="instruction-text">${formatTextWithFractions(t ? t.text : '')}</div>
  </article>
</section>`;
  }

  const firstTextIdx = q.elements.findIndex(e => e.type === 'text');
  const stemText = firstTextIdx >= 0 ? q.elements[firstTextIdx].text : '';

  // Split the question's body into one chunk per PDF page, breaking at each
  // pageBreak element so a long question can flow neatly across pages.
  const pages = [[]];
  q.elements.forEach((el, j) => {
    if (j === firstTextIdx) return;
    if (el.type === 'pageBreak') { pages.push([]); return; }
    pages[pages.length - 1].push(elementToPrintHtml(el, qIndex, j));
  });

  const num = questionDisplayNumber(qIndex);
  return pages.map((parts, pageIdx) => {
    const header = pageIdx === 0
      ? `<div class="question-header">
      <div class="question-number">${num}</div>
      <div class="question-stem">${formatTextWithFractions(stemText)}</div>
    </div>`
      : `<div class="question-header continued-header">
      <div class="question-number">${num}</div>
      <div class="continued-note">Continued from previous page</div>
    </div>`;
    const source = (pageIdx === pages.length - 1 && q.source && showSources)
      ? `<div class="question-source">From: ${escapeHtml(q.source)}</div>`
      : '';
    return `
<section class="print-question">
  <article class="question-card">
    ${header}
    ${parts.join('\n')}
    ${source}
  </article>
</section>`;
  }).join('\n');
}

function elementToPrintHtml(el, qIndex, elIndex) {
  switch (el.type) {
    case 'text':
      return `<div class="question-sub">${formatTextWithFractions(el.text)}</div>`;
    case 'image': {
      if (!el.dataUrl) return '';
      const cap = el.caption ? `<div class="img-caption">${escapeHtml(el.caption)}</div>` : '';
      const scale = clampImgScale(el.scale ?? 1.0);
      const widthStyle = `style="width:${Math.round(scale * 100)}%"`;
      return `<div class="question-image"><img src="${escapeAttr(el.dataUrl)}" alt="${escapeAttr(el.caption || '')}" ${widthStyle} />${cap}</div>`;
    }
    case 'part':
      return `<div class="part-stem"><span class="part-marker">${escapeHtml(el.label)}</span><span class="part-text">${formatTextWithFractions(el.text)}</span></div>`;
    case 'mcq': {
      const opts = el.options.map((opt, i) =>
        `<div class="option-item print-option"><div class="option-radio"></div><div class="option-label"><span class="option-marker">${String.fromCharCode(65+i)}</span>${formatTextWithFractions(opt.text)}</div></div>`
      ).join('');
      return `<div class="options-list">${opts}</div>`;
    }
    case 'answer':
      return `<div class="answer-field"><span class="answer-field-prefix">${escapeHtml(el.label || 'Ans :')}</span><span class="answer-field-print-line"></span></div>`;
    case 'openLines': {
      const n = clampLines(el.lines);
      const rows = Array.from({ length: n }, () => '<div class="open-lines-row">&nbsp;</div>').join('');
      return `<div class="open-lines-box">${rows}</div>`;
    }
    case 'workingSpace': {
      const n = clampLines(el.lines);
      const heightPx = n * 30;
      return `<div class="working-space-box" style="min-height:${heightPx}px;"></div>`;
    }
    case 'answerKey':
      // Answer keys are not printed on student worksheets.
      return '';
    case 'pageBreak':
      // Handled by questionToPrintHtml splitting the body across pages.
      return '';
    case 'video': {
      const cap = el.caption ? escapeHtml(el.caption) : 'Video';
      const url = (el.url || '').trim();
      if (!url) return '';
      // Use Dropbox's preview URL (?dl=0) when scanned so phones open in-app/browser nicely.
      const scanUrl = url.replace(/[?&]raw=1/, '');
      const qrSrc = `https://api.qrserver.com/v1/create-qr-code/?size=160x160&margin=2&data=${encodeURIComponent(scanUrl)}`;
      return `
<div class="video-print">
  <div class="video-print-meta">
    <div class="video-print-title">▶ ${cap}</div>
    <div class="video-print-url">${escapeHtml(url)}</div>
    <div class="video-print-hint">Scan the QR code to watch.</div>
  </div>
  <img class="video-print-qr" src="${escapeAttr(qrSrc)}" alt="QR code for video link" />
</div>`;
    }
  }
  return '';
}

function escapeHtml(s) {
  return String(s || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}
function escapeAttr(s) { return escapeHtml(s); }

function buildStandaloneHtml() {
  const css = getEmbeddedPreviewCss() + getCoverCss();
  const body = state.questions.map((q, qIndex) => questionToHtml(q, qIndex)).join('\n');
  const cover = buildCoverHtml();
  const correctMap = {};
  state.questions.forEach((q, i) => {
    q.elements.forEach((el, j) => {
      if (el.type === 'mcq' && el.correctId) {
        const idx = el.options.findIndex(o => o.id === el.correctId);
        if (idx >= 0) correctMap[`${i}-${j}`] = idx;
      }
    });
  });

  const coverOn = !!getCover().enabled;
  const blankPage = coverOn ? `<section class="cover-blank-print" aria-hidden="true"></section>` : '';
  const pageHeader = coverOn ? '' : `
  <header class="preview-header">
    <h2>${escapeHtml(state.title)}</h2>
    ${state.subtitle ? `<p>${escapeHtml(state.subtitle)}</p>` : ''}
  </header>`;
  return `<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>${escapeHtml(state.title)}</title>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>${css}</style>

<body>
${cover}
${blankPage}
<div class="page">${pageHeader}
  <div class="questions-container">
    ${body}
  </div>
</div>
<script>
  const CORRECT = ${JSON.stringify(correctMap)};
  document.querySelectorAll('.option-item').forEach((item) => {
    item.addEventListener('click', () => {
      const list = item.parentElement;
      const key = list.dataset.key;
      const idx = Array.from(list.children).indexOf(item);
      list.querySelectorAll('.option-item').forEach(o => o.classList.remove('selected','correct-answer','wrong-answer'));
      if (CORRECT[key] === undefined) { item.classList.add('selected'); return; }
      if (CORRECT[key] === idx) item.classList.add('correct-answer');
      else {
        item.classList.add('wrong-answer');
        list.children[CORRECT[key]].classList.add('correct-answer');
      }
    });
  });
  document.querySelectorAll('.answer-field').forEach((row) => {
    const expected = (row.dataset.answer || '').trim().toLowerCase();
    const input = row.querySelector('.answer-field-input');
    if (!input) return;

      input.classList.remove('correct','wrong');

      if (input.value.trim().toLowerCase() === expected) input.classList.add('correct');
      else if (input.value.trim()) input.classList.add('wrong');
    });
  });
${'<\/script>'}

</html>`;
}

function questionToHtml(q, qIndex) {

      ).join('');

        ? `<img class="answer-key-image" src="${escapeAttr(el.dataUrl)}" alt="Answer key screenshot" />` : '';
      if (!bodyText && !bodyImg) return '';
      return `<details class="answer-key-export"><summary>Show answer key</summary>${bodyText}${bodyImg}</details>`;
    }
    case 'video': {
      const embed = toEmbeddableVideoUrl(el.url || '');
      const cap = el.caption ? `<div class="video-caption">${escapeHtml(el.caption)}</div>` : '';
      if (!embed) return `<div class="video-block"><div class="video-placeholder">(no video link provided)</div>${cap}</div>`;
      if (embed.kind === 'native') {
        return `<div class="video-block"><video src="${escapeAttr(embed.url)}" controls preload="metadata"></video>${cap}</div>`;
      }
      return `<div class="video-block"><iframe src="${escapeAttr(embed.url)}" allow="autoplay; fullscreen" allowfullscreen></iframe>${cap}</div>`;
    }
    case 'pageBreak':
      // Only meaningful in PDF export; show a subtle divider in standalone HTML.
      return `<div class="page-break-marker"><span class="page-break-marker-label">Page break (PDF only)</span></div>`;
  }
  return '';
}

function saveJson() {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = (state.title || 'worksheet').replace(/[^a-z0-9_-]+/gi, '_').toLowerCase() + '.json';
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}
function loadJson(file) {
  if (state.questions.length > 0 &&
      !confirm('Load this file? It replaces the current worksheet.\n\n' +
               'A snapshot is saved to the Activity Log first, and the loaded ' +
               'file starts as a NEW worksheet (it will not overwrite any ' +
               'worksheet already saved in the system).')) {
    return;
  }
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const parsed = JSON.parse(reader.result);
      if (!parsed || !Array.isArray(parsed.questions)) throw new Error('Invalid file.');
      logActivity('before loading a file');
      state = parsed;
      // A file load is a brand-new worksheet — never silently overwrite the
      // cloud worksheet that happened to be open before.
      currentSavedId = null;
      currentSavedTitle = null;
      document.getElementById('worksheetTitle').value = state.title || '';
      document.getElementById('worksheetSubtitle').value = state.subtitle || '';
syncCoverInputs();
      seedUploadCacheFromState(state);
      hydrateImageRefs(state);
      renderEditor();
      renderPreview();
      updateLinkStatus();
      logActivity('loaded file: ' + (state.title || 'Untitled'));
    } catch (e) {
      alert('Could not load JSON: ' + e.message);
    }
  };
  reader.readAsText(file);
}

const COVER_LOGO_URL = 'https://www.dropbox.com/scl/fi/2wc1ulpjuiaqlxk5qhc07/polymath-logo-sticker-copy.png?rlkey=jhutxqmdbwe0jgoqcwdxzwt55&raw=1';
const COVER_FIELD_PLACEHOLDERS = {
  header: 'Cover header',
  title: 'Worksheet title',
  subheader: 'Subheader',
  footer: 'Cover footer'
};
function coverFieldValue(field) {
  if (field === 'title') return state.title || '';
  return getCover()[field] || '';
}
// Show a placeholder when an editable field is empty (mirrors HTML
// inputs); without it the empty span is invisible and unclickable.
function applyCoverPlaceholder(el) {
  if (!el) return;
  const empty = el.textContent.trim() === '';
  el.dataset.empty = empty ? 'true' : 'false';
  if (empty) el.dataset.placeholder = COVER_FIELD_PLACEHOLDERS[el.dataset.coverField] || '';
}
function refreshCoverPreviewField(field) {
  const wrap = document.getElementById('coverPreviewWrap');
  if (!wrap) return;
  const el = wrap.querySelector(`[data-cover-field="${field}"]`);
  if (!el) return;
  if (document.activeElement === el) return;
  const val = coverFieldValue(field);
  if (el.textContent !== val) el.textContent = val;
  applyCoverPlaceholder(el);
}
function buildCoverPreviewMarkup() {
  return `
    <section class="cover-preview" aria-label="Cover page preview">
      <div class="cover-header" contenteditable="true" spellcheck="false" data-cover-field="header"></div>
      <div class="cover-center">
        <img class="cover-logo" src="${COVER_LOGO_URL}" alt="" />
        <h1 class="cover-title" contenteditable="true" spellcheck="false" data-cover-field="title"></h1>
        <div class="cover-subtitle" contenteditable="true" spellcheck="false" data-cover-field="subheader"></div>
        <div class="cover-fields-grid">
          <div class="cover-field">

            <div class="cover-field-line"></div>
          </div>
          <div class="cover-field">
            <div class="cover-field-label">Date</div>
            <div class="cover-field-line"></div>
          </div>
        </div>
      </div>
      <div class="cover-footer" contenteditable="true" spellcheck="false" data-cover-field="footer"></div>
    </section>
    <div class="cover-blank-page" aria-hidden="true"></div>
  `;
}
function wireCoverPreviewEditing(wrap) {
  wrap.querySelectorAll('[data-cover-field]').forEach((el) => {
    el.addEventListener('focus', () => {
      // Clear the placeholder so caret doesn't sit before placeholder text.
      el.dataset.empty = 'false';
    });
    el.addEventListener('blur', () => applyCoverPlaceholder(el));
    el.addEventListener('input', () => {
      const field = el.dataset.coverField;
      const val = el.textContent;
      if (field === 'title') {
        state.title = val;
        const ti = document.getElementById('worksheetTitle');
        if (ti && document.activeElement !== ti) ti.value = val;
        previewTitleEl.textContent = val || 'Untitled Worksheet';
      } else {
        getCover()[field] = val;
        const inputId =
          field === 'header' ? 'coverHeaderInput' :
          field === 'subheader' ? 'coverSubheaderInput' :
          field === 'footer' ? 'coverFooterInput' : null;
        const inp = inputId && document.getElementById(inputId);
        if (inp && document.activeElement !== inp) inp.value = val;
      }
      scheduleAutoSave();
    });
    // Plain-text paste — no rich text gets pasted into the cover fields.
    el.addEventListener('paste', (ev) => {
      ev.preventDefault();
      const text = (ev.clipboardData || window.clipboardData).getData('text/plain') || '';
      document.execCommand('insertText', false, text);
    });
  });
}
function ensureCoverPreview() {
  const pane = document.querySelector('.preview-pane');
  if (!pane) return;
  const c = getCover();
  let wrap = document.getElementById('coverPreviewWrap');
  if (!c.enabled) {
    if (wrap) wrap.remove();
    return;
  }
  if (!wrap) {
    wrap = document.createElement('div');
    wrap.id = 'coverPreviewWrap';
    wrap.innerHTML = buildCoverPreviewMarkup();
    pane.insertBefore(wrap, pane.firstChild);
    wireCoverPreviewEditing(wrap);
  }
  // Mirror state into the editable fields, but never clobber a field the
  // user is actively typing into.
  ['header', 'title', 'subheader', 'footer'].forEach(refreshCoverPreviewField);
}

async function signInGoogle() {
  try {
    hideAuthHint();
    await signInWithPopup(fbAuth, googleProvider);
    // onAuthStateChanged will refresh the UI.
  } catch (e) {
    const code = e && e.code ? e.code : '';
    if (code === 'auth/popup-blocked') {
      showAuthHint('Pop-up was blocked — please allow pop-ups and try again.');
    } else if (code === 'auth/unauthorized-domain') {
      showAuthHint(
        'This domain is not authorised for sign-in. ' +
        'Open the <a href="https://console.firebase.google.com/project/mathgen--app/authentication/settings" target="_blank" rel="noopener">Firebase Auth settings</a> ' +
        'and add this page\'s domain under <em>Authorised domains</em>.'

    } else if (code === 'auth/operation-not-allowed') {
      showAuthHint(
        'Google sign-in is not enabled for this Firebase project. ' +
        'Enable it under <a href="https://console.firebase.google.com/project/mathgen--app/authentication/providers" target="_blank" rel="noopener">Authentication → Sign-in method → Google</a>.'
      );
    } else {
      showAuthHint('Sign-in failed: ' + (e.message || code || e));
