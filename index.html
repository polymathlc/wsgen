  saveSystemBtn.title = isAdmin()
    ? 'Save this worksheet to the cloud'
    : `Sign in as ${ALLOWED_EMAIL} to enable cloud saving`;
}

/* ---------- Firestore CRUD ---------- */
function worksheetsCol() {
  return collection(fbDb, 'worksheets');
}
function isAdmin() {
  return currentUser && (currentUser.email || '').toLowerCase() === ALLOWED_EMAIL;
}

function worksheetStoragePath(id) {
  return `${WORKSHEET_STORAGE_PREFIX}/${id}.json`;
}

// Firestore docs cap at ~1 MiB. Inline base64 images used to blow past that on
// every save, so:
//   - Image binaries now live in Cloud Storage, keyed by sha256(content).
//     Each unique image uploads once; the worksheet JSON only references its
//     storage path. Most saves become tiny text writes.
//   - If the trimmed JSON still exceeds one doc, it's sharded across sibling
//     `worksheets/<id>__chunk__<i>` docs and the chunks are written in parallel.
const CHUNK_CHARS = 700_000;
const CHUNK_SUFFIX = '__chunk__';
const chunkDocId = (id, i) => `${id}${CHUNK_SUFFIX}${i}`;
const isChunkDocId = (docId) => typeof docId === 'string' && docId.includes(CHUNK_SUFFIX);
const IMAGE_STORAGE_PREFIX = 'worksheet-images';
const STATE_FORMAT_VERSION = 2;

// hash -> { path, mime } — content-addressed image refs we've uploaded this session.
const uploadedImageCache = new Map();
// path -> Promise<dataUrl or downloadUrl> — in-flight image hydrations.
const imageHydrateCache = new Map();
// Set of in-flight upload promises per element so we know when to retry a save.
const inflightImageUploads = new Set();

function imageElements(s) {
  const out = [];
  for (const q of (s && s.questions) || []) {
    for (const el of (q.elements) || []) {
      if ((el.type === 'image' || el.type === 'answerKey')) out.push(el);
    }
  }
  return out;
}

function bytesToHex(buf) {
  const a = new Uint8Array(buf);
  let s = '';
  for (let i = 0; i < a.length; i++) s += a[i].toString(16).padStart(2, '0');
  return s;
}

function decodeBase64(b64) {
  const bin = atob(b64);
  const out = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
  return out;
}

// data:image/png;base64,iVBOR... -> { mime, ext, bytes }
function parseDataUrl(dataUrl) {
  const m = /^data:([^;,]+)?(?:;([^,]+))?,(.*)$/s.exec(dataUrl || '');
  if (!m) return null;
  const mime = (m[1] || 'application/octet-stream').toLowerCase();
  const isBase64 = (m[2] || '').includes('base64');
  const raw = m[3];
  let bytes;
  try {
    bytes = isBase64 ? decodeBase64(raw) : new TextEncoder().encode(decodeURIComponent(raw));
  } catch (_) {
    return null;
  }
  const ext = (mime.split('/')[1] || 'bin').replace(/[^a-z0-9]/gi, '') || 'bin';
  return { mime, ext, bytes };
}

async function hashImageDataUrl(dataUrl) {
  const parsed = parseDataUrl(dataUrl);
  if (!parsed) return null;
  const buf = await crypto.subtle.digest('SHA-256', parsed.bytes);
  return { hash: bytesToHex(buf), mime: parsed.mime, ext: parsed.ext, bytes: parsed.bytes };
}

// Upload an image element's dataUrl to Storage (if it isn't already), and
// tag the element with `imageRef` so subsequent serializations skip the
// inline base64. Safe to call repeatedly; no-ops once an imageRef is set.
async function ensureImageUploaded(el) {
  if (!el || (el.type !== 'image' && el.type !== 'answerKey')) return;
  if (el.imageRef && el.imageRef.path) return;
  if (!el.dataUrl || !el.dataUrl.startsWith('data:')) return;
  if (!currentUser || !isAdmin()) return;
  const info = await hashImageDataUrl(el.dataUrl);
  if (!info) return;
  if (uploadedImageCache.has(info.hash)) {
    el.imageRef = uploadedImageCache.get(info.hash);
    return;
  }
  const path = `${IMAGE_STORAGE_PREFIX}/${info.hash}.${info.ext}`;
  const ref = storageRef(fbStorage, path);
  // Upload base64 directly; cheaper than re-encoding bytes.
  await uploadString(ref, el.dataUrl, 'data_url');
  const r = { path, mime: info.mime };
  uploadedImageCache.set(info.hash, r);
  el.imageRef = r;
}

// Walk the current state and kick off uploads for any image that still
// carries an inline dataUrl. Resolves once everything has either uploaded
// or failed (failures stay inline and get retried next time).
function kickoffImageUploads(s = state) {
  if (!currentUser || !isAdmin()) return Promise.resolve();
  const pending = [];
  for (const el of imageElements(s)) {
    if (el.imageRef && el.imageRef.path) continue;
    if (!el.dataUrl || !el.dataUrl.startsWith('data:')) continue;
    const p = ensureImageUploaded(el).catch((e) => {
      console.warn('image upload failed:', e && (e.message || e));
    });
    inflightImageUploads.add(p);
    p.finally(() => inflightImageUploads.delete(p));
    pending.push(p);
  }
  return Promise.all(pending);
}

// Build the JSON we actually send to Firestore: strip every dataUrl on an
// element that has an imageRef. Anything still inline stays inline (so the
// save still works while uploads are in flight).
function serializeStateForCloud(s) {
  return JSON.stringify(s, function (key, value) {
    if (key === 'dataUrl' && this && this.imageRef && this.imageRef.path) return undefined;
    return value;
  });
}

function withTimeout(promise, ms, label) {
  if (!Number.isFinite(ms) || ms <= 0) return promise;
  return new Promise((resolve, reject) => {
    const timer = setTimeout(() => reject(new Error(`${label || 'operation'} timed out after ${Math.round(ms/1000)}s`)), ms);
    promise.then((v) => { clearTimeout(timer); resolve(v); },
                 (e) => { clearTimeout(timer); reject(e); });
  });
}

async function retrying(label, fn, { attempts = 3, baseMs = 600, timeoutMs = 20000 } = {}) {
  let lastErr;
  for (let i = 0; i < attempts; i++) {
    try {
      return await withTimeout(fn(), timeoutMs, label);
    } catch (e) {
      lastErr = e;
      if (i === attempts - 1) break;
      await new Promise(r => setTimeout(r, baseMs * Math.pow(2, i)));
    }
  }
  throw lastErr;
}

// Core cloud-save routine, shared by the manual button and the auto-saver.
async function persistToSystem() {
  // Best-effort: upload any pending images first so the serialized JSON
  // is small. If an upload is slow we still proceed (the next save mops up).
  await Promise.race([
    kickoffImageUploads(),
    new Promise((r) => setTimeout(r, 8000))
  ]);

  const id = currentSavedId || `ws_${Date.now().toString(36)}`;
  const stateWithVersion = { ...state, schemaVersion: STATE_FORMAT_VERSION };
  const json = serializeStateForCloud(stateWithVersion);
  const chunks = [];
  for (let i = 0; i < json.length; i += CHUNK_CHARS) {
    chunks.push(json.slice(i, i + CHUNK_CHARS));
  }
  if (chunks.length === 0) chunks.push('');

  // 1. Find out how many chunks the previous version had so we can clear
  //    any orphans if the new version is shorter.
  let prevChunkCount = 0;
  try {
    const prevSnap = await retrying('read prev metadata',
      () => getDoc(doc(fbDb, 'worksheets', id)),
      { attempts: 2, timeoutMs: 8000 });
    if (prevSnap.exists()) prevChunkCount = prevSnap.data().chunkCount || 0;
  } catch (_) { /* best-effort */ }

  // 2. Write every chunk doc in parallel (each with its own retry/timeout).
  await Promise.all(chunks.map((chunk, i) =>
    retrying(`save chunk ${i + 1}/${chunks.length}`,
      () => setDoc(doc(fbDb, 'worksheets', chunkDocId(id, i)), {
        parentId: id,
        index: i,
        data: chunk
      })
    )
  ));

  // 3. Write the metadata doc last so a partial save can't be discovered.
  await retrying('save metadata', () => setDoc(doc(fbDb, 'worksheets', id), {
    id,
    title: state.title || 'Untitled',
    subtitle: state.subtitle || '',
    chunkCount: chunks.length,
    ownerEmail: currentUser.email,
    ownerUid: currentUser.uid,
    savedAt: serverTimestamp(),
    savedAtClient: new Date().toISOString(),
    sizeBytes: json.length,
    schemaVersion: STATE_FORMAT_VERSION
  }));

  // 4. Drop any leftover chunk docs from a longer previous save (parallel,
  //    best-effort — orphans are harmless and the next save retries).
  if (prevChunkCount > chunks.length) {
    await Promise.allSettled(
      Array.from({ length: prevChunkCount - chunks.length }, (_, k) =>
        deleteDoc(doc(fbDb, 'worksheets', chunkDocId(id, chunks.length + k)))
      )
    );
  }

  currentSavedId = id;
  currentSavedTitle = state.title || 'Untitled';
}

/* =========================================================================
   SAVE ENGINE
   Single coalescing pipeline shared by every trigger (autosave, manual
   "Save to System", "Save as New", typing, image paste). One save runs at
   a time; if another change lands while one is in flight, exactly one more
   save fires when it completes. The status pill is the single source of
   truth for what's happening.
   ========================================================================= */
const SAVE_STATUS_LABELS = {
  idle:    'Saved',
  saving:  'Saving…',
  error:   'Save failed',
  offline: 'Offline',
  paused:  'Auto-save paused',
};
let saveStatusState = 'idle';
let saveStatusLastError = null;

function setSaveStatus(kind, opts = {}) {
  saveStatusState = kind;
  if (opts.error !== undefined) saveStatusLastError = opts.error;
  if (kind !== 'error') saveStatusLastError = null;
  const el = document.getElementById('saveStatus');
  if (!el) return;
  el.dataset.state = kind;
  const text = el.querySelector('.save-status-text');
  if (text) text.textContent = opts.label || SAVE_STATUS_LABELS[kind] || kind;
  const retry = el.querySelector('#saveStatusRetry');
  if (retry) retry.style.display = (kind === 'error') ? '' : 'none';
  el.title = saveStatusLastError
    ? `${SAVE_STATUS_LABELS[kind] || kind} — ${saveStatusLastError.message || saveStatusLastError}`
    : (SAVE_STATUS_LABELS[kind] || kind);
}

// Coalescing save controller. Exactly one save runs at a time. While one is
// running, further requests just set `pendingSave`; when it finishes,
// exactly one more save fires (collapsing N edits into a single trailing
// save).
let saveInFlight = false;
let pendingSave = false;
let pendingForceNew = false;
let pendingResolves = [];

function requestCloudSave({ forceNew = false } = {}) {
  if (!currentUser || !isAdmin()) return Promise.resolve();
  if (forceNew) pendingForceNew = true;
  return new Promise((resolve) => {
    pendingResolves.push(resolve);
    pendingSave = true;
    runSaveLoop();
  });
}

async function runSaveLoop() {
  if (saveInFlight) return;
  if (!pendingSave) return;
  if (!currentUser || !isAdmin()) { pendingSave = false; pendingResolves = []; return; }
  if (typeof navigator !== 'undefined' && navigator.onLine === false) {
    setSaveStatus('offline');
    return; // online-listener will resume this
  }

  // Latch: capture the work for this cycle, then clear so new edits during
  // the save trigger a single trailing save.
  saveInFlight = true;
  pendingSave = false;
  const forceNew = pendingForceNew;
  pendingForceNew = false;
  const waiters = pendingResolves;
  pendingResolves = [];

  if (forceNew) {
    currentSavedId = null;
    currentSavedTitle = null;
  } else if (currentSavedId && (state.title || '') !== (currentSavedTitle || '')) {
    // Title changed since we opened this worksheet. Don't silently overwrite
    // a different worksheet — pause auto-save until the admin confirms.
    setSaveStatus('paused', { label: 'Auto-save paused — title changed' });
    saveInFlight = false;
    waiters.forEach((r) => r({ ok: false, reason: 'title-mismatch' }));
    updateLinkStatus();
    return;
  }

  setSaveStatus('saving');
  try {
    await persistToSystem();
    setSaveStatus('idle');
    logActivity('saved: ' + (state.title || 'Untitled'));
    updateLinkStatus();
    refreshSavedList().catch(() => {});
    waiters.forEach((r) => r({ ok: true }));
  } catch (e) {
    console.warn('Save failed:', e && (e.message || e));
    setSaveStatus('error', { error: e });
    waiters.forEach((r) => r({ ok: false, reason: 'error', error: e }));
  } finally {
    saveInFlight = false;
    if (pendingSave) {
      // A change landed while we were saving — handle it next tick.
      Promise.resolve().then(runSaveLoop);
    }
  }
}

/* Manual save trigger.
   - forceNew: always create a brand-new worksheet (never overwrite).
   - Otherwise, if linked to a worksheet whose title no longer matches, ask
     before overwriting (defaults to "save as new" so a swapped paper can't
     clobber the original). */
async function saveToSystem(forceNew = false) {
  if (!currentUser) { alert('Please sign in with Google first.'); return; }
  if (!isAdmin()) {
    alert(`Cloud saving is restricted to ${ALLOWED_EMAIL}.`);
    return;
  }
  if (!forceNew && currentSavedId && (state.title || '') !== (currentSavedTitle || '')) {
    const overwrite = confirm(
      `This worksheet is linked to the saved worksheet:\n` +
      `    "${currentSavedTitle}"\n\n` +
      `but it is now titled:\n    "${state.title || 'Untitled'}"\n\n` +
      `OK  = overwrite "${currentSavedTitle}" with the current content\n` +
      `Cancel = save as a NEW, separate worksheet (recommended)`);
    if (!overwrite) forceNew = true;
  }
  const result = await requestCloudSave({ forceNew });
  if (!result.ok && result.reason === 'error') {
    alert('Save failed: ' + (result.error && (result.error.message || result.error)) +
      '\n\nMake sure Firestore rules allow:\n' +
      "match /worksheets/{ws} {\n" +
      "  allow read: if request.auth != null;\n" +
      "  allow write: if request.auth != null && request.auth.token.email == 'chungzhikai@gmail.com';\n" +
      "}");
  }
}

async function fetchWorksheetState(data) {
  // New format: state sharded across Firestore chunk docs.
  if (data.chunkCount && data.chunkCount > 0) {
    const parts = new Array(data.chunkCount);
    for (let i = 0; i < data.chunkCount; i++) {
      const snap = await getDoc(doc(fbDb, 'worksheets', chunkDocId(data.id, i)));
      if (!snap.exists()) throw new Error(`Missing chunk ${i + 1} of ${data.chunkCount}.`);
      parts[i] = snap.data().data || '';
    }
    return JSON.parse(parts.join(''));
  }
  // Older save: state was uploaded to Cloud Storage.
  if (data.storagePath) {
    try {
      const bytes = await getBytes(storageRef(fbStorage, data.storagePath));
      return JSON.parse(new TextDecoder().decode(bytes));
    } catch (e) {
      throw new Error(
        'Could not read this worksheet from Cloud Storage (' +
        (e.code || e.message || e) + '). ' +
        'Have the admin open it and click Save to System once to re-upload it.'
      );
    }
  }
  // Oldest legacy format: full state embedded in the Firestore doc.
  if (typeof data.state === 'string') return JSON.parse(data.state);
  if (data.state && typeof data.state === 'object') return data.state;
  throw new Error('Worksheet has no state payload.');
}

// Replace any `imageRef` on an image/answerKey element with a viewable URL
// (a Storage download URL) set on `dataUrl`. Cached by storage path, so
// reopening a worksheet during the same session reuses the URLs.
async function hydrateImageRefs(s) {
  const tasks = [];
  for (const el of imageElements(s)) {
    if (el.dataUrl) continue;
    if (!el.imageRef || !el.imageRef.path) continue;
    const path = el.imageRef.path;
    if (!imageHydrateCache.has(path)) {
      imageHydrateCache.set(path,
        retrying('fetch image URL',
          () => getDownloadURL(storageRef(fbStorage, path)),
          { attempts: 2, timeoutMs: 10000 }
        ).catch(() => null)
      );
    }
    tasks.push(imageHydrateCache.get(path).then((url) => {
      if (url) el.dataUrl = url;
    }));
  }
  // Don't block the whole load on slow image fetches — render the worksheet
  // first, then resolve images as URLs come back. Re-render on each.
  if (tasks.length > 0) {
    Promise.allSettled(tasks).then(() => {
      try { renderPreview(); } catch (_) {}
    });
  }
}

// Pre-seed the upload cache with refs we just loaded so the next save
// doesn't try to re-upload images we already have in Storage.
function seedUploadCacheFromState(s) {
  for (const el of imageElements(s)) {
    if (el.imageRef && el.imageRef.path) {
      // We don't know the hash for refs loaded from disk, but knowing the
      // ref is already set means ensureImageUploaded() short-circuits.
      // Nothing more to cache here.
    }
  }
}

async function loadFromSystem(id) {
  if (!currentUser) return;
  try {
    const ref = doc(fbDb, 'worksheets', id);
    const snap = await getDoc(ref);
    if (!snap.exists()) {
      alert('That worksheet no longer exists.');
      return;
    }
    const data = snap.data();
    const parsed = await fetchWorksheetState(data);
    if (isAdmin()) logActivity('before opening: ' + (data.title || 'worksheet'));
    state = parsed;
    currentSavedId = id;
    currentSavedTitle = state.title || 'Untitled';
    document.getElementById('worksheetTitle').value = state.title || '';
    document.getElementById('worksheetSubtitle').value = state.subtitle || '';
syncCoverInputs();
    seedUploadCacheFromState(state);
    hydrateImageRefs(state);
    if (isAdmin()) renderEditor();
    renderPreview();
    updateLinkStatus();
    setSaveStatus('idle');
    await refreshSavedList();
    // Lazy migrate: any inline images in a legacy worksheet now get
    // hashed + uploaded so the *next* autosave drops to a tiny JSON write.
    if (isAdmin()) {
      kickoffImageUploads().then(() => {
        if (currentSavedId === id) scheduleCloudAutoSave();
      }).catch(() => {});
    }
  } catch (e) {
    console.error(e);
    alert('Load failed: ' + (e.message || e));
  }
}

async function deleteFromSystem(id) {
  if (!currentUser || !isAdmin()) return;
  if (!confirm('Delete this saved worksheet from the cloud?')) return;
  try {
    // Look up chunkCount so we can drop the shards too.
    let chunkCount = 0;
    let storagePath = null;
    try {
      const metaSnap = await getDoc(doc(fbDb, 'worksheets', id));
      if (metaSnap.exists()) {
        const md = metaSnap.data();
        chunkCount = md.chunkCount || 0;
        storagePath = md.storagePath || null;
      }
    } catch (_) {}

    for (let i = 0; i < chunkCount; i++) {
      try { await deleteDoc(doc(fbDb, 'worksheets', chunkDocId(id, i))); } catch (_) {}
    }
    if (storagePath) {
      try {
        await deleteObject(storageRef(fbStorage, storagePath));
      } catch (storageErr) {
        if (storageErr && storageErr.code && storageErr.code !== 'storage/object-not-found') {
          console.warn('Storage delete warning:', storageErr.code || storageErr.message);
        }
      }
    }
    await deleteDoc(doc(fbDb, 'worksheets', id));
    if (currentSavedId === id) { currentSavedId = null; currentSavedTitle = null; }
    await refreshSavedList();
  } catch (e) {
    alert('Delete failed: ' + (e.message || e));
  }
}

async function refreshSavedList() {
  const list = document.getElementById('savedList');
  list.innerHTML = '';
  if (!currentUser) { savedItemsCache = []; return; }
  const isRealWorksheet = (d, docId) =>
    !isChunkDocId(docId) && d && d.parentId === undefined && (d.title || d.id);
  try {
    const col = worksheetsCol();
    const snap = await getDocs(query(col, orderBy('savedAtClient', 'desc')));
    savedItemsCache = snap.docs
      .filter(d => isRealWorksheet(d.data(), d.id))
      .map(d => d.data());
  } catch (e) {
    try {
      const snap = await getDocs(worksheetsCol());
      savedItemsCache = snap.docs
        .filter(d => isRealWorksheet(d.data(), d.id))
        .map(d => d.data())
        .sort((a, b) => (b.savedAtClient || '').localeCompare(a.savedAtClient || ''));
    } catch (e2) {
      console.error(e2);
      savedItemsCache = [];
    }
  }
  // Keep a stable display order: a worksheet that already appears in the list
  // keeps its position even after it is edited / re-saved (so it doesn't jump
  // to the top mid-edit). Worksheets seen for the first time go to the top,
  // newest first.
  {
    const byId = new Map(savedItemsCache.map(it => [it.id, it]));
    const kept = savedOrder.filter(id => byId.has(id));
    const fresh = savedItemsCache
      .filter(it => !savedOrder.includes(it.id))
      .sort((a, b) => (b.savedAtClient || '').localeCompare(a.savedAtClient || ''))
      .map(it => it.id);
    savedOrder = [...fresh, ...kept];
    savedItemsCache = savedOrder.map(id => byId.get(id));
  }
  // The link indicator needs the cache to resolve the linked worksheet's name.
  updateLinkStatus();
  // Students only see worksheets the admin has chosen to show.
  const visibleItems = isAdmin()
    ? savedItemsCache
    : savedItemsCache.filter(it => !it.hidden);
  if (visibleItems.length === 0) {
    if (!isAdmin()) {
      const empty = document.createElement('div');
      empty.className = 'saved-item';
      empty.innerHTML = '<div class="saved-item-name" style="cursor:default; color:var(--text-tertiary);">No worksheets available yet.</div>';
      list.appendChild(empty);
    }
    return;
  }
  const header = document.createElement('div');
  header.className = 'saved-item';
  const headerLabel = isAdmin() ? `My saved worksheets (${visibleItems.length})` : `Available worksheets (${visibleItems.length})`;
  header.innerHTML = `<div class="saved-item-name" style="cursor:default; font-weight:700; color:var(--text-secondary);">${headerLabel}</div>`;
  list.appendChild(header);
  visibleItems.forEach((it) => {
    const row = document.createElement('div');
    row.className = 'saved-item'
      + (it.hidden ? ' worksheet-hidden' : '')
      + (it.id === currentSavedId ? ' saved-item-current' : '');
    const name = document.createElement('div');
    name.className = 'saved-item-name';
    name.textContent = (it.title || '(untitled)') + (it.hidden ? '  (hidden)' : '');
    name.addEventListener('click', () => loadFromSystem(it.id));
    const meta = document.createElement('span');
    meta.className = 'saved-item-meta';
    if (it.savedAtClient) {
      meta.textContent = new Date(it.savedAtClient).toLocaleString();
    }
    row.appendChild(name);
    row.appendChild(meta);
    if (isAdmin()) {
      const eye = makeIconBtn('👁',
        it.hidden
          ? 'Hidden from students — click to show'
          : 'Visible to students — click to hide',
        () => toggleWorksheetHidden(it.id, !!it.hidden));
      if (it.hidden) eye.classList.add('eye-off');
      row.appendChild(eye);
      const del = makeIconBtn('✕', 'Delete', () => deleteFromSystem(it.id), true);
      row.appendChild(del);
    }
    list.appendChild(row);
  });
}

// Toggle whether a saved worksheet appears in a student's worksheet list.
async function toggleWorksheetHidden(id, currentlyHidden) {
  if (!isAdmin()) return;
  try {
    await setDoc(doc(fbDb, 'worksheets', id), { hidden: !currentlyHidden }, { merge: true });
    await refreshSavedList();
  } catch (e) {
    alert('Could not change worksheet visibility: ' + (e.message || e));
  }
}

function newWorksheet() {
  if (state.questions.length > 0 && !confirm('Discard the current worksheet and start fresh?')) return;
  logActivity('before new worksheet');
  state = { title: 'New Worksheet', subtitle: '', questions: [] };
  currentSavedId = null;
  currentSavedTitle = null;
  document.getElementById('worksheetTitle').value = state.title;
  document.getElementById('worksheetSubtitle').value = '';
  syncCoverInputs();
  addQuestion();
  updateLinkStatus();
  refreshSavedList();
}

/* =========================================================================
   DRAFT WORKSHEET  — collect questions from different worksheets, then
   open them all together as one new worksheet. Persisted in localStorage
   so the draft survives navigating between worksheets and page reloads.
   ========================================================================= */
const DRAFT_KEY = 'wsgen.draftQuestions';

function loadDraft() {
  try {
    const raw = localStorage.getItem(DRAFT_KEY);
    const parsed = raw ? JSON.parse(raw) : [];
    return Array.isArray(parsed) ? parsed : [];
  } catch (_) {
    return [];
  }
}
function saveDraft(arr) {
  try {
    localStorage.setItem(DRAFT_KEY, JSON.stringify(arr));
  } catch (e) {
    alert('Could not save to draft (storage may be full): ' + e.message);
  }
}
function reidQuestion(q) {
  const clone = JSON.parse(JSON.stringify(q));
  clone.id = newId();
  (clone.elements || []).forEach(el => {
    el.id = newId();
    if (Array.isArray(el.options)) {
      const remap = {};
      el.options.forEach(o => {
        const nid = newId();
        remap[o.id] = nid;
        o.id = nid;
      });
      if (el.correctId && remap[el.correctId]) el.correctId = remap[el.correctId];
    }
  });
  return clone;
}
/* Build a short "school + year" label from a worksheet title, e.g.
   "Catholic High School 2025 P6 Maths Prelim (...)" → "Catholic High 2025 Prelims". */
function deriveSource(rawTitle) {
  let t = (rawTitle || '').trim();
  if (!t) return '';
  t = t.replace(/\([^)]*\)/g, ' '); // drop parentheticals
  const yearMatch = t.match(/\b(?:19|20)\d{2}\b/);
  const year = yearMatch ? yearMatch[0] : '';
  const isPrelim = /prelim/i.test(t);
  // The school name is whatever comes before the year.
  let name = year ? t.slice(0, t.indexOf(year)) : t;
  name = name
    .replace(/\bprimary\s*school\b/ig, '')
    .replace(/\bschool\b/ig, '')
    .replace(/\bprimary\b/ig, '')
    .replace(/\bP[1-6]\b/ig, '')
    .replace(/\bmathematics\b/ig, '')
    .replace(/\bmaths?\b/ig, '')
    .replace(/\bexamination\b/ig, '')
    .replace(/\bend of year\b/ig, '')
    .replace(/[—–-]+/g, ' ')
    .replace(/\s+/g, ' ')
    .trim();
  const parts = [];
  if (name) parts.push(name);
  if (year) parts.push(year);
  parts.push(isPrelim ? 'Prelims' : 'Exam');
  return parts.join(' ').trim();
}

function copyQuestionToDraft(qIndex) {
  const q = state.questions[qIndex];
  if (!q) return;
  const draft = loadDraft();
  const clone = reidQuestion(q);
  // Tag the question with where it came from so the draft worksheet shows it.
  if (!clone.source) clone.source = deriveSource(state.title);
  draft.push(clone);
  saveDraft(draft);
  updateDraftBadge();
}
function openDraft() {
  const draft = loadDraft();
  if (draft.length === 0) {
    alert('Draft is empty. Click 📋 on any question to copy it into the draft.');
    return;
  }
  if (state.questions.length > 0 &&
      !confirm(`Replace the current worksheet with the ${draft.length} draft question(s)?`)) {
    return;
  }
  logActivity('before opening draft');
  state = {
    title: 'Draft Worksheet',
    subtitle: '',
    questions: draft.map(reidQuestion)
  };
  currentSavedId = null;
  currentSavedTitle = null;
  document.getElementById('worksheetTitle').value = state.title;
  document.getElementById('worksheetSubtitle').value = '';
  syncCoverInputs();
  renderEditor();
  renderPreview();
  updateLinkStatus();
}
function clearDraft() {
  const n = loadDraft().length;
  if (n === 0) return;
  if (!confirm(`Clear ${n} question(s) from the draft?`)) return;
  saveDraft([]);
  updateDraftBadge();
}
function updateDraftBadge() {
  const n = loadDraft().length;
  const openBtn = document.getElementById('openDraftBtn');
  if (openBtn) openBtn.textContent = `📋 Open Draft (${n})`;
  const clearBtn = document.getElementById('clearDraftBtn');
  if (clearBtn) clearBtn.style.display = n > 0 ? '' : 'none';
}

/* =========================================================================
   AUTO-SAVE — persist work after every action (typing, pasting an image,
   adding a question, …).
   - localStorage: an immediate safety net that survives page reloads.
   - Cloud: once a worksheet has been saved to the system at least once,
     later edits sync automatically (admin only) through the coalescing
     save engine above. The status pill reflects exactly one state.
   ========================================================================= */
const AUTOSAVE_KEY = 'wsgen.autosaveState';
let localAutoSaveTimer = null;
let cloudAutoSaveTimer = null;

function autoSaveLocal() {
  try {
    localStorage.setItem(AUTOSAVE_KEY, JSON.stringify(state));
    return true;
  } catch (e) {
    console.warn('Local autosave failed:', e.message || e);
    return false;
  }
}

function scheduleAutoSave() {
  clearTimeout(localAutoSaveTimer);
  localAutoSaveTimer = setTimeout(runAutoSave, 600);
}

function runAutoSave() {
  // Students view read-only worksheets — nothing of theirs to persist.
  if (currentUser && !isAdmin()) return;
  autoSaveLocal();
  maybePeriodicSnapshot();
  scheduleCloudAutoSave();
}

function scheduleCloudAutoSave() {
  if (!isAdmin() || !currentSavedId) return;
  clearTimeout(cloudAutoSaveTimer);
  cloudAutoSaveTimer = setTimeout(() => requestCloudSave(), 1500);
}

function restoreAutoSave() {
  let raw = null;
  try { raw = localStorage.getItem(AUTOSAVE_KEY); } catch (_) { return false; }
  if (!raw) return false;
  try {
    const parsed = JSON.parse(raw);
    if (parsed && Array.isArray(parsed.questions) && parsed.questions.length > 0) {
      state = parsed;
      document.getElementById('worksheetTitle').value = state.title || '';
      document.getElementById('worksheetSubtitle').value = state.subtitle || '';
syncCoverInputs();
      seedUploadCacheFromState(state);
      hydrateImageRefs(state);
      renderEditor();
      renderPreview();
      return true;
    }
  } catch (_) {}
  return false;
}

/* =========================================================================
   ACTIVITY LOG — a per-browser history of worksheet snapshots so an
   accidental overwrite can be undone. A snapshot is taken before every
   action that replaces the worksheet (loading a file / cloud worksheet,
   starting fresh, opening the draft), after each save to the system, and
   periodically while editing.
   ========================================================================= */
const ACTIVITY_KEY = 'wsgen.activityLog';
const MAX_ACTIVITY = 25;

function loadActivityLog() {
  try {
    const raw = localStorage.getItem(ACTIVITY_KEY);
    const parsed = raw ? JSON.parse(raw) : [];
    return Array.isArray(parsed) ? parsed : [];
  } catch (_) {
    return [];
  }
}

function saveActivityLog(log) {
  // Snapshots can be large (embedded images); if the storage quota is hit,
  // drop the oldest entries until it fits.
  const copy = log.slice();
  while (copy.length) {
    try {
      localStorage.setItem(ACTIVITY_KEY, JSON.stringify(copy));
      return;
    } catch (_) {
      copy.pop();
    }
  }
  try { localStorage.setItem(ACTIVITY_KEY, '[]'); } catch (_) {}
}

function logActivity(label) {
  let json;
  try { json = JSON.stringify(state); } catch (_) { return; }
  const log = loadActivityLog();
  // Skip if nothing has changed since the most recent snapshot.
  if (log.length && log[0].state === json) return;
  log.unshift({
    ts: new Date().toISOString(),
    label: label || 'snapshot',
    title: state.title || 'Untitled',
    questionCount: (state.questions || []).length,
    state: json
  });
  while (log.length > MAX_ACTIVITY) log.pop();
  saveActivityLog(log);
  updateActivityLogBtn();
  renderActivityLog();
}

function maybePeriodicSnapshot() {
  const log = loadActivityLog();
  const lastTs = log.length ? Date.parse(log[0].ts) : 0;
  if (Date.now() - lastTs > 5 * 60 * 1000) logActivity('auto-snapshot');
}

function updateActivityLogBtn() {
  const btn = document.getElementById('activityLogBtn');
  if (btn) btn.textContent = `📜 Activity Log (${loadActivityLog().length})`;
}

function renderActivityLog() {
  const panel = document.getElementById('activityLog');
  if (!panel) return;
  if (!activityLogOpen) { panel.style.display = 'none'; return; }
  panel.style.display = '';
  panel.innerHTML = '';
  const log = loadActivityLog();

  const header = document.createElement('div');
  header.className = 'saved-item';
  header.innerHTML = `<div class="saved-item-name" style="cursor:default; font-weight:700; color:var(--text-secondary);">Activity log — click a row to restore (${log.length})</div>`;
  if (log.length) {
    header.appendChild(makeIconBtn('🗑', 'Clear the activity log', () => {
      if (confirm('Clear the entire activity log?')) {
        saveActivityLog([]);
        updateActivityLogBtn();
        renderActivityLog();
      }
    }, true));
  }
  panel.appendChild(header);

  if (!log.length) {
    const empty = document.createElement('div');
    empty.className = 'saved-item';
    empty.innerHTML = '<div class="saved-item-name" style="cursor:default; color:var(--text-tertiary);">No history yet.</div>';
    panel.appendChild(empty);
    return;
  }

  log.forEach((entry, i) => {
    const row = document.createElement('div');
    row.className = 'saved-item';
    const name = document.createElement('div');
    name.className = 'saved-item-name';
    name.innerHTML = `${escapeHtml(entry.title)} <span style="color:var(--text-tertiary);">· ${escapeHtml(entry.label)} · ${entry.questionCount} q</span>`;
    name.title = 'Restore this version';
    name.addEventListener('click', () => restoreActivityEntry(i));
    const meta = document.createElement('span');
    meta.className = 'saved-item-meta';
    meta.textContent = entry.ts ? new Date(entry.ts).toLocaleString() : '';
    const restore = document.createElement('span');
    restore.className = 'saved-item-restore';
    restore.textContent = '↩ Restore';
    restore.style.cursor = 'pointer';
    restore.addEventListener('click', () => restoreActivityEntry(i));
    row.appendChild(name);
    row.appendChild(meta);
    row.appendChild(restore);
    panel.appendChild(row);
  });
}

function restoreActivityEntry(index) {
  const log = loadActivityLog();
  const entry = log[index];
  if (!entry) return;
  const when = entry.ts ? new Date(entry.ts).toLocaleString() : 'this snapshot';
  if (!confirm(`Restore "${entry.title}" (${entry.questionCount} questions) from ${when}?\n\n` +
               'The current worksheet is snapshotted to the log first. The restored ' +
               'worksheet is unlinked — use "Save to System" to save it where you want.')) {
    return;
  }
  logActivity('before restore');
  let restored;
  try { restored = JSON.parse(entry.state); }
  catch (e) { alert('Could not restore this snapshot: ' + e.message); return; }
  state = restored;
  // Never auto-relink — the admin decides where the restored copy is saved.
  currentSavedId = null;
  currentSavedTitle = null;
  document.getElementById('worksheetTitle').value = state.title || '';
  document.getElementById('worksheetSubtitle').value = state.subtitle || '';
syncCoverInputs();
  seedUploadCacheFromState(state);
  hydrateImageRefs(state);
  renderEditor();
  renderPreview();
  updateLinkStatus();
}

function updateLinkStatus() {
  const el = document.getElementById('linkStatus');
  if (!el) return;
  if (currentSavedId && (state.title || '') !== (currentSavedTitle || '')) {
    el.textContent = '⚠ Title changed since opening "' + currentSavedTitle + '". ' +
      'Auto cloud-save is PAUSED so it cannot overwrite that worksheet. ' +
      'Use "Save to System" (overwrite) or "Save as New".';
    el.className = 'link-status warn admin-only';
  } else if (currentSavedId) {
    el.textContent = '🔗 Editing saved worksheet: "' + currentSavedTitle + '" — changes auto-save to it.';
    el.className = 'link-status linked admin-only';
  } else {
    el.textContent = '🆕 New / unlinked worksheet — "Save to System" creates a new entry.';
    el.className = 'link-status admin-only';
  }
}

document.getElementById('activityLogBtn').addEventListener('click', () => {
  activityLogOpen = !activityLogOpen;
  renderActivityLog();
});
updateActivityLogBtn();

/* =========================================================================
   TOPIC / CONCEPT FILTER
   Each question carries an optional topic and concept. The admin can filter
   the editor + preview by them. These fields are admin-only — they never
   appear in exports or in a student's preview.
   ========================================================================= */
function questionMatchesFilter(q) {
  const t = filterTopic.trim().toLowerCase();
  const c = filterConcept.trim().toLowerCase();
  if (t && !topicsOf(q).some(v => v.toLowerCase().includes(t))) return false;
  if (c && !conceptsOf(q).some(v => v.toLowerCase().includes(c))) return false;
  return true;
}

function refreshFilterDatalists() {
  const topics = new Set();
  const concepts = new Set();
  state.questions.forEach(q => {
    topicsOf(q).forEach(v => topics.add(v));
    conceptsOf(q).forEach(v => concepts.add(v));
  });
  const fill = (id, values) => {
    const dl = document.getElementById(id);
    if (!dl) return;
    dl.innerHTML = '';
    [...values].sort().forEach(v => {
      const o = document.createElement('option');
      o.value = v;
      dl.appendChild(o);
    });
  };
  fill('topicOptions', topics);
  fill('conceptOptions', concepts);
}

function updateFilterCount(shown) {
  const el = document.getElementById('filterCount');
  if (!el) return;
  const total = state.questions.length;
  if ((filterTopic.trim() || filterConcept.trim()) && total > 0) {
    el.textContent = `Showing ${shown} of ${total}`;
  } else {
    el.textContent = '';
  }
}

function applyFilterFromInputs() {
  filterTopic = document.getElementById('filterTopic').value;
  filterConcept = document.getElementById('filterConcept').value;
  renderEditor();
  renderPreview();
}

/* Gather every question matching the current topic / concept filter from ALL
   saved worksheets into one combined "search results" worksheet, so the admin
   can, e.g., find all Volume questions across the whole library and copy the
   ones they want into the draft. */
async function searchAllWorksheets() {
  if (!isAdmin()) {
    alert('Searching across worksheets requires the admin account.');
    return;
  }
  filterTopic = document.getElementById('filterTopic').value;
  filterConcept = document.getElementById('filterConcept').value;
  const t = filterTopic.trim();
  const c = filterConcept.trim();
  if (!t && !c) {
    alert('Type a topic and/or concept in the filter boxes first, then search.');
    return;
  }
  const btn = document.getElementById('searchAllBtn');
  const original = btn.textContent;
  btn.textContent = '⏳ Searching…';
  btn.disabled = true;
  try {
    const matches = [];
    for (const meta of savedItemsCache) {
      if (!meta || !meta.id) continue;
      let ws;
      try {
        ws = await fetchWorksheetState(meta);
      } catch (e) {
        console.warn('Search skipped worksheet', meta.id, e.message || e);
        continue;
      }
      const wsTitle = (ws && ws.title) || meta.title || 'Untitled';
      (ws && ws.questions || []).forEach(q => {
        if (questionMatchesFilter(q)) {
          const copy = reidQuestion(q);
          if (!copy.source) copy.source = deriveSource(wsTitle);
          matches.push(copy);
        }
      });
    }
    logActivity('before topic search');
    const crit = [t && `topic "${t}"`, c && `concept "${c}"`].filter(Boolean).join(' + ');
    state = {
      title: 'Search results — ' + crit,
      subtitle: matches.length
        ? `${matches.length} question(s) gathered from all saved worksheets. Use 📋 on any question to copy it into the draft.`
        : `No questions across your saved worksheets match ${crit}.`,
      questions: matches
    };
    currentSavedId = null;
    currentSavedTitle = null;
    document.getElementById('worksheetTitle').value = state.title;
    document.getElementById('worksheetSubtitle').value = state.subtitle;
    syncCoverInputs();
    renderEditor();
    renderPreview();
    updateLinkStatus();
  } finally {
    btn.textContent = original;
    btn.disabled = false;
  }
}

document.getElementById('filterTopic').addEventListener('input', applyFilterFromInputs);
document.getElementById('filterConcept').addEventListener('input', applyFilterFromInputs);
document.getElementById('clearFilterBtn').addEventListener('click', () => {
  document.getElementById('filterTopic').value = '';
  document.getElementById('filterConcept').value = '';
  applyFilterFromInputs();
});
document.getElementById('searchAllBtn').addEventListener('click', searchAllWorksheets);

document.getElementById('saveSystemBtn').addEventListener('click', () => saveToSystem(false));
document.getElementById('saveAsNewBtn').addEventListener('click', () => saveToSystem(true));
document.getElementById('saveStatusRetry').addEventListener('click', (e) => {
  e.preventDefault();
  e.stopPropagation();
  if (currentSavedId) requestCloudSave();
  else saveToSystem(false);
});
window.addEventListener('online', () => {
  if (saveStatusState === 'offline' || saveStatusState === 'error') {
    setSaveStatus('idle');
    if (currentSavedId) requestCloudSave();
  }
});
window.addEventListener('offline', () => {
  if (saveStatusState !== 'saving') setSaveStatus('offline');
});
document.getElementById('signOutBtn').addEventListener('click', signOutUser);
document.getElementById('googleSignInBtn').addEventListener('click', signInGoogle);
document.getElementById('newWorksheetBtn').addEventListener('click', newWorksheet);
document.getElementById('openDraftBtn').addEventListener('click', openDraft);
document.getElementById('clearDraftBtn').addEventListener('click', clearDraft);
updateDraftBadge();

async function migrateLegacyWorksheets() {
  if (!isAdmin()) return;
  try {
    const legacy = await getDocs(collection(fbDb, 'users', currentUser.uid, 'worksheets'));
    if (legacy.empty) return;
    const shared = await getDocs(collection(fbDb, 'worksheets'));
    const existing = new Set(shared.docs.map(d => d.id));
    let migrated = 0;
    for (const d of legacy.docs) {
      if (existing.has(d.id)) continue;
      const data = d.data();
      await setDoc(doc(fbDb, 'worksheets', d.id), {
        id: d.id,
        title: data.title || 'Untitled',
        state: data.state, // already stringified
        ownerEmail: currentUser.email,
        ownerUid: currentUser.uid,
        savedAt: serverTimestamp(),
        savedAtClient: data.savedAtClient || new Date().toISOString()
      });
      migrated++;
    }
    if (migrated > 0) {
      console.info(`Migrated ${migrated} legacy worksheet(s) to shared collection.`);
      await refreshSavedList();
    }
  } catch (e) {
    console.warn('Legacy migration skipped:', e.message || e);
  }
}

onAuthStateChanged(fbAuth, async (user) => {
  currentUser = user || null;
  currentSavedId = null;
  currentSavedTitle = null;
  // For students, clear any in-progress editor state and let them pick from the library.
  if (currentUser && !isAdmin()) {
    state = { title: '', subtitle: '', questions: [] };
    document.getElementById('worksheetTitle').value = '';
    document.getElementById('worksheetSubtitle').value = '';
  syncCoverInputs();
  }
  refreshAuthUi();
  // Re-render so the preview reflects the current edit permissions
  // (inline editing turns on once the admin is signed in).
  renderEditor();
  renderPreview();
  await refreshSavedList();
  // If admin, one-shot migrate any worksheets saved before the shared collection was introduced.
  if (currentUser && isAdmin()) migrateLegacyWorksheets();
});

refreshAuthUi();

/* =========================================================================
   COLLAPSIBLE LEFT PANEL
   ========================================================================= */
const PANEL_KEY = 'wsgen.panelCollapsed';
function setPanelCollapsed(collapsed) {
  document.body.classList.toggle('panel-collapsed', collapsed);
  try { localStorage.setItem(PANEL_KEY, collapsed ? '1' : '0'); } catch (_) {}
}
document.getElementById('panelCollapseBtn').addEventListener('click', () => setPanelCollapsed(true));
document.getElementById('panelExpandBtn').addEventListener('click', () => setPanelCollapsed(false));
try {
  if (localStorage.getItem(PANEL_KEY) === '1') document.body.classList.add('panel-collapsed');
} catch (_) {}

// Restore the last auto-saved worksheet if there is one; otherwise seed a
// single empty question so the workflow is obvious. (Students get reset to an
// empty preview by onAuthStateChanged once their sign-in resolves.)
if (!restoreAutoSave()) addQuestion();
updateLinkStatus();
